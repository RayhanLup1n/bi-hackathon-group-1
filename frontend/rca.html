<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTA &amp; Bowtie Analysis — R.A.D.A.R Pangan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    /* -- Reset + Design tokens (inline fallback) -- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #EEF7F1; --bg2: #F0FBF4;
      --surface: #FFFFFF; --surface2: #F0FBF4;
      --border: #1a1a1a; --border2: #1a1a1a;
      --accent: #2ECC88; --accent2: #1D7A56;
      --warn: #FBBF24; --danger: #F87171; --success: #34D399;
      --highlight: #A7F3D0; --info: #67E8F9;
      --text: #1a1a1a; --text2: #3f3f46; --muted: #71717a;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
      --radius: 16px; --radius-sm: 12px;
      --shadow: 4px 4px 0px #1a1a1a; --shadow-lg: 6px 6px 0px #1a1a1a;
      --bw: 2.5px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(46,204,136,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(29,122,86,0.08) 0%, transparent 50%),
        radial-gradient(circle at 60% 80%, rgba(52,211,153,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    /* -- App container (inline fallback) -- */
    .app {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* -- Header (inline fallback) -- */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; padding: 14px 20px;
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-icon {
      width: 52px; height: 52px;
      border: var(--bw) solid var(--border); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 3px 3px 0 var(--border);
      overflow: hidden; padding: 0;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
    .header-title {
      font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: var(--text);
    }
    .header-sub {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      margin-top: 2px; letter-spacing: 0.5px;
    }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-link {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      padding: 7px 13px; border-radius: var(--radius-sm); text-decoration: none;
      border: var(--bw) solid var(--border); box-shadow: 2px 2px 0 var(--border);
      transition: transform 0.1s, box-shadow 0.1s; cursor: pointer;
    }
    .nav-link:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--border); }
    .nav-link-default { background: var(--surface); color: var(--accent2); }
    .nav-link-default:hover { background: #E0F5EA; }
    .nav-link-active { background: var(--accent); color: #fff; }
    .nav-link-danger { background: #FEE2E2; color: #DC2626; }
    .nav-link-danger:hover { background: #FECACA; }
    .user-badge {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      padding: 7px 13px; background: var(--surface2);
      border: var(--bw) solid var(--border); border-radius: var(--radius-sm);
      box-shadow: 2px 2px 0 var(--border);
    }
    .user-badge strong { color: var(--accent2); }

    /* -- Responsive header stacking -- */
    @media (max-width: 640px) {
      .header { flex-direction: column; gap: 12px; align-items: flex-start; }
      .header-right { width: 100%; justify-content: flex-start; }
    }

    /* -- FTA page-specific styles -- */

    /* ── Card (override shared - larger padding + margin) ── */
    .card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 22px; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .card::after {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 5px;
      background: var(--accent); border-radius: var(--radius) var(--radius) 0 0;
    }
    .card-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .card-label::before {
      content: ''; display: inline-block;
      width: 4px; height: 12px; background: var(--accent);
      border-radius: 2px; border: 1px solid var(--border);
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 14px;
      align-items: end;
    }
    @media (max-width: 700px) { .filter-bar { grid-template-columns: 1fr; } }

    .filter-group label {
      display: block; font-family: var(--mono); font-size: 10px;
      font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 6px;
    }
    .filter-input {
      width: 100%; padding: 10px 12px;
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); font-family: var(--mono); font-size: 11px;
      font-weight: 600; box-shadow: 3px 3px 0 var(--border);
      outline: none; cursor: pointer;
    }
    .filter-input:focus { outline: 3px solid var(--accent); outline-offset: 2px; }

    .btn-run {
      padding: 10px 22px; background: var(--accent); color: #fff;
      border: var(--bw) solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--sans); font-size: 13px; font-weight: 800;
      cursor: pointer; box-shadow: var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
      white-space: nowrap;
    }
    .btn-run:hover { background: var(--accent2); }
    .btn-run:active { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--border); }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: translate(2px, 2px); }

    /* ── Status card ── */
    .status-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
    }
    @media (max-width: 600px) { .status-row { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 18px;
      box-shadow: var(--shadow); text-align: center;
    }
    .stat-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
      margin-bottom: 6px;
    }
    .stat-value { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
    .stat-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 500; }

    .stat-anomaly { border-left: 6px solid var(--danger); }
    .stat-normal { border-left: 6px solid var(--success); }

    /* ── Detail Root Cause ── */
    .detail-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 22px; margin-bottom: 20px;
    }
    .detail-title {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px;
    }
    .detail-cause {
      padding: 16px; background: #FEF3C7; border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); box-shadow: 2px 2px 0 var(--border);
      margin-bottom: 14px;
    }
    .detail-cause-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      color: #92400e; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .detail-cause-text { font-size: 14px; font-weight: 700; color: #78350f; line-height: 1.6; }

    .detail-recommendation {
      padding: 16px; background: #DBEAFE; border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); box-shadow: 2px 2px 0 var(--border);
    }
    .detail-rec-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      color: #1e40af; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .detail-rec-text { font-size: 13px; font-weight: 600; color: #1e3a5f; line-height: 1.6; }

    /* ── Context cards row ── */
    .context-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;
    }
    @media (max-width: 600px) { .context-row { grid-template-columns: 1fr; } }

    .context-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow);
    }
    .context-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px;
    }
    .weather-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #e5e5e5;
      font-size: 13px;
    }
    .weather-item:last-child { border-bottom: none; }
    .weather-icon { font-size: 18px; flex-shrink: 0; }
    .weather-val { font-family: var(--mono); font-size: 12px; font-weight: 700; }
    .weather-label { font-size: 12px; color: var(--muted); }

    .holiday-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #e5e5e5; font-size: 13px;
    }
    .holiday-item:last-child { border-bottom: none; }
    .holiday-date { font-family: var(--mono); font-size: 11px; color: var(--muted); font-weight: 600; }
    .holiday-name { font-weight: 700; }

    .extreme-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 6px;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      border: 1.5px solid var(--border);
    }
    .extreme-yes { background: #FEE2E2; color: #DC2626; }
    .extreme-no { background: #D1FAE5; color: #065f46; }

    /* ── Timeline ── */
    .timeline-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .timeline-table thead { background: var(--surface2); }
    .timeline-table th {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 10px 14px; text-align: left;
      border-bottom: var(--bw) solid var(--border);
    }
    .timeline-table td {
      padding: 10px 14px; border-bottom: 1px solid #e5e5e5;
      font-family: var(--mono); font-size: 11px; font-weight: 600;
    }
    .timeline-table tbody tr:hover { background: #F5F3FF; }

    .empty-state {
      text-align: center; padding: 40px 20px;
      font-family: var(--mono); font-size: 12px; color: var(--muted); font-weight: 600;
    }

    .spinner { width: 18px; height: 18px; border: 3px solid rgba(46,204,136,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body>
<div class="app" x-data="rcaPage()" x-cloak>

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-left">
      <div class="logo-icon"><img src="/assets/logo.png" alt="RADAR Pangan"></div>
      <div>
        <div class="header-title">R.A.D.A.R Pangan</div>
        <div class="header-sub">fta &amp; bowtie analysis &nbsp;·&nbsp; v0.5</div>
      </div>
    </div>
    <div class="header-right">
      <span class="user-badge">
        <strong x-text="user?.username || '—'"></strong> · <span x-text="user?.role || ''"></span>
      </span>
      <a href="/" class="nav-link nav-link-default">Dashboard</a>
      <a href="/guide" class="nav-link nav-link-default">Panduan</a>
      <template x-if="user?.is_analyst || user?.is_admin || user?.role === 'analyst' || user?.role === 'admin'">
        <a href="/analysis" class="nav-link nav-link-active">FTA</a>
      </template>
      <template x-if="user?.is_analyst || user?.is_admin || user?.role === 'analyst' || user?.role === 'admin'">
        <a href="/prediksi" class="nav-link nav-link-default">Prediksi</a>
      </template>
      <template x-if="user?.is_admin || user?.role === 'admin'">
        <a href="/admin" class="nav-link nav-link-default">Admin</a>
      </template>
      <button @click="logout()" class="nav-link nav-link-danger">Keluar</button>
    </div>
  </header>

  <!-- ── Filter Bar ── -->
  <div class="card">
    <div class="filter-bar">
      <div class="filter-group">
        <label>Komoditas</label>
        <select class="filter-input" x-model="selectedKey">
          <template x-for="c in commodities" :key="c.key">
            <option :value="c.key" x-text="c.name"></option>
          </template>
        </select>
      </div>
      <div class="filter-group">
        <label>Wilayah</label>
        <select class="filter-input" x-model="selectedProvinsi">
          <option value="">Semua Wilayah</option>
          <template x-for="p in provinces" :key="p.id">
            <option :value="p.id" x-text="p.name"></option>
          </template>
        </select>
      </div>
      <div class="filter-group">
        <label>Tanggal Simulasi</label>
        <input type="date" class="filter-input" x-model="simDate">
      </div>
      <button class="btn-run" @click="runRCA()" :disabled="loading">
        <template x-if="loading"><span class="spinner" style="width:14px;height:14px;border-width:2px;"></span></template>
        <template x-if="!loading"><span>Jalankan FTA</span></template>
      </button>
    </div>
  </div>

  <!-- ── Status Cards ── -->
  <template x-if="result">
    <div>
      <div class="status-row" style="margin-bottom:20px;">
        <div class="stat-card" :class="result.is_anomaly ? 'stat-anomaly' : 'stat-normal'">
          <div class="stat-label">Status</div>
          <div class="stat-value" :style="result.is_anomaly ? 'color:#DC2626' : 'color:#059669'"
               x-text="result.is_anomaly ? 'ANOMALI' : 'NORMAL'"></div>
          <div class="stat-sub" x-text="result.root_cause || 'Tidak ada anomali terdeteksi'"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Delta Harga</div>
          <div class="stat-value" :style="result.delta_pct > 0 ? 'color:#DC2626' : (result.delta_pct < 0 ? 'color:#059669' : '')"
               x-text="(result.delta_pct > 0 ? '+' : '') + result.delta_pct.toFixed(1) + '%'"></div>
          <div class="stat-sub" x-text="'Rp ' + (result.price_now||0).toLocaleString('id-ID') + '/kg'"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Persebaran Kota</div>
          <div class="stat-value" x-text="result.kota_naik + '/' + result.total_kota"></div>
          <div class="stat-sub" x-text="'kota naik (' + ((result.total_kota ? result.kota_naik/result.total_kota*100 : 0).toFixed(0)) + '%)'"></div>
        </div>
      </div>

      <!-- ── Detail Root Cause ── -->
      <template x-if="result.root_cause">
        <div class="detail-card">
          <div class="detail-title">Detail Root Cause</div>
          <div class="detail-cause">
            <div class="detail-cause-label">Penyebab</div>
            <div class="detail-cause-text">
              <strong x-text="result.root_cause"></strong>
              <template x-if="result.description">
                <div style="margin-top:6px;font-size:12px;color:#555;" x-text="result.description"></div>
              </template>
            </div>
          </div>
          <div class="detail-recommendation">
            <div class="detail-rec-label">Rekomendasi Kebijakan</div>
            <div class="detail-rec-text" x-text="result.recommendation || 'Lakukan monitoring intensif dan koordinasi dengan TPID setempat.'"></div>
          </div>
          <template x-if="result.severity_level">
            <div style="margin-top:12px;font-family:var(--mono);font-size:10px;color:var(--muted);">
              Severity: <strong x-text="result.severity_level"></strong>
              <template x-if="result.yes_indicators.length">
                <span> — <span x-text="result.yes_indicators.join(', ')"></span></span>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- ── Context: Cuaca + Hari Besar ── -->
      <div class="context-row">
        <div class="context-card">
          <div class="context-label">Info Cuaca (Open-Meteo)</div>
          <template x-if="cuacaData">
            <div>
              <div style="margin-bottom:8px;">
                <span class="extreme-badge" :class="cuacaData.ekstrem ? 'extreme-yes' : 'extreme-no'"
                      x-text="cuacaData.ekstrem ? '⚠ Cuaca Ekstrem' : '✓ Normal'"></span>
              </div>
              <div class="weather-item">
                <span class="weather-icon">🌧</span>
                <span class="weather-val" x-text="cuacaData.detail?.precipitation_sum?.toFixed(1) || '—'"></span>
                <span class="weather-label">mm curah hujan</span>
              </div>
              <div class="weather-item">
                <span class="weather-icon">🌡</span>
                <span class="weather-val" x-text="cuacaData.detail?.temperature_max?.toFixed(1) || '—'"></span>
                <span class="weather-label">°C suhu maks</span>
              </div>
              <div class="weather-item">
                <span class="weather-icon">💨</span>
                <span class="weather-val" x-text="cuacaData.detail?.wind_speed_max?.toFixed(1) || '—'"></span>
                <span class="weather-label">km/h angin maks</span>
              </div>
              <div class="weather-item" x-show="cuacaData.daerah">
                <span class="weather-icon">📍</span>
                <span class="weather-val" x-text="cuacaData.daerah || ''"></span>
                <span class="weather-label"></span>
              </div>
            </div>
          </template>
          <template x-if="!cuacaData">
            <div class="empty-state">Pilih komoditas dan jalankan Analisis</div>
          </template>
        </div>

        <div class="context-card">
          <div class="context-label">Hari Besar Terdekat</div>
          <template x-if="result.checks && result.checks.length > 0">
            <div>
              <template x-for="check in result.checks.filter(c => c.name.includes('Hari Raya'))" :key="check.name">
                <div>
                  <template x-if="check.result === 'TRIGGERED'">
                    <div class="holiday-item" style="background:#FEF3C7;padding:10px;border-radius:8px;">
                      <span style="font-size:20px;">🕌</span>
                      <div>
                        <div class="holiday-name" x-text="check.detail"></div>
                        <div style="font-family:var(--mono);font-size:10px;color:#92400e;font-weight:600;">Demand window aktif</div>
                      </div>
                    </div>
                  </template>
                  <template x-if="check.result !== 'TRIGGERED'">
                    <div class="holiday-item">
                      <span style="font-size:18px;">📅</span>
                      <div>
                        <div class="holiday-name" style="font-size:12px;" x-text="check.detail || 'Tidak dalam periode hari raya'"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!result.checks">
            <div class="empty-state">Jalankan Analisis untuk melihat info hari besar</div>
          </template>
        </div>
      </div>

      <!-- ── Bowtie Analysis ── -->
      <template x-if="bowtieData">
        <div>
          <!-- FTA Threat Grid -->
          <div class="detail-card">
            <div class="detail-title" style="display:flex;align-items:center;justify-content:space-between;">
              <span>FTA Threats</span>
              <span style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent2);background:#E0F5EA;border:1.5px solid var(--border);padding:2px 9px;border-radius:6px;"
                    x-text="bowtieData.active_threats.filter(t => t.active).length + ' aktif · ' + bowtieData.severity_level"></span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;">
              <template x-for="t in bowtieData.active_threats" :key="t.id">
                <div style="padding:10px 12px;border:var(--bw) solid var(--border);border-radius:var(--radius-sm);"
                     :style="t.active ? 'background:#FEF3C7;box-shadow:2px 2px 0 var(--border);' : 'background:var(--surface2);opacity:0.7;'">
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                    <span style="font-family:var(--sans);font-size:12px;font-weight:700;" x-text="t.id + ': ' + t.name"></span>
                    <span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid var(--border);"
                          :style="t.active ? 'background:#FEF3C7;color:#92400e;' : 'background:var(--surface);color:var(--muted);'"
                          x-text="t.active ? 'AKTIF' : 'NORMAL'"></span>
                  </div>
                  <div style="font-family:var(--sans);font-size:11px;color:var(--text2);line-height:1.4;" x-text="t.desc"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- Bowtie Visualization -->
          <div class="detail-card">
            <div class="detail-title" style="display:flex;align-items:center;justify-content:space-between;">
              <span>Bowtie Analysis</span>
              <span style="font-family:var(--mono);font-size:10px;font-weight:700;background:#E0F5EA;border:1.5px solid var(--border);padding:2px 9px;border-radius:6px;"
                    :style="bowtieData.active_threats.filter(t => t.active).length > 0 ? 'color:#B45309;' : 'color:var(--accent2);'"
                    x-text="bowtieData.active_threats.filter(t => t.active).length > 0 ? 'Threat Aktif' : 'Clear'"></span>
            </div>
            <!-- Summary -->
            <div style="padding:10px 14px;background:var(--surface2);border:var(--bw) solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:12px;color:var(--text2);margin-bottom:12px;box-shadow:2px 2px 0 var(--border);line-height:1.5;"
                 x-text="bowtieData.summary"></div>
            <!-- Prevention — Hazard — Mitigation -->
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              <!-- Prevention -->
              <div style="flex:1;min-width:200px;padding:12px;border:var(--bw) solid var(--border);border-radius:var(--radius-sm);background:#ECFDF5;box-shadow:2px 2px 0 var(--border);">
                <div style="font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#059669;margin-bottom:8px;"
                     x-text="'Pencegahan (' + bowtieData.prevention.filter(b => b.active).length + ' aktif)'"></div>
                <template x-for="b in bowtieData.prevention" :key="b.id">
                  <div style="font-family:var(--sans);font-size:11px;color:var(--text2);padding:4px 0;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;gap:6px;"
                       :style="b.active ? 'font-weight:700;' : 'opacity:0.55;'">
                    <span x-text="b.active ? '🟢' : '⚪'" style="font-size:10px;flex-shrink:0;"></span>
                    <span x-text="b.id + ': ' + b.name"></span>
                  </div>
                </template>
              </div>
              <!-- Hazard Event -->
              <div style="flex:0 0 auto;min-width:120px;padding:12px;border:var(--bw) solid var(--border);border-radius:var(--radius-sm);background:#FEF3C7;box-shadow:2px 2px 0 var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
                <div style="font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#92400e;margin-bottom:6px;">Hazard</div>
                <div style="font-size:20px;">⚠️</div>
                <div style="font-family:var(--sans);font-size:11px;font-weight:700;color:#92400e;margin-top:4px;" x-text="bowtieData.hazard_event"></div>
              </div>
              <!-- Mitigation -->
              <div style="flex:1;min-width:200px;padding:12px;border:var(--bw) solid var(--border);border-radius:var(--radius-sm);background:#FEE2E2;box-shadow:2px 2px 0 var(--border);">
                <div style="font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#dc2626;margin-bottom:8px;"
                     x-text="'Mitigasi (' + bowtieData.mitigation.filter(b => b.active).length + ' aktif)'"></div>
                <template x-for="b in bowtieData.mitigation" :key="b.id">
                  <div style="font-family:var(--sans);font-size:11px;color:var(--text2);padding:4px 0;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;gap:6px;"
                       :style="b.active ? 'font-weight:700;' : 'opacity:0.55;'">
                    <span x-text="b.active ? '🔴' : '⚪'" style="font-size:10px;flex-shrink:0;"></span>
                    <span x-text="b.id + ': ' + b.name"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>

    </div>
  </template>

  <!-- ── Empty state ── -->
  <template x-if="!result && !loading">
    <div class="card">
      <div class="empty-state" style="padding:60px 20px;">
        <div style="font-size:40px;margin-bottom:12px;">🔍</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:6px;">Pilih komoditas dan jalankan analisis</div>
        <div>FTA engine akan memeriksa 6 faktor ancaman harga secara berurutan</div>
      </div>
    </div>
  </template>

  <!-- ── Loading state ── -->
  <template x-if="loading && !result">
    <div class="card">
      <div class="empty-state" style="padding:60px 20px;">
        <div class="spinner" style="margin:0 auto 16px;width:28px;height:28px;display:block;"></div>
        <div>Mengambil data dan menjalankan analisis...</div>
      </div>
    </div>
  </template>

</div>

<script>
function rcaPage() {
  return {
    // Auth
    token: localStorage.getItem('rca_token'),
    user: JSON.parse(localStorage.getItem('rca_user') || 'null'),

    // Data
    commodities: [],
    provinces: [
      { id: 11, name: 'Banten' },
      { id: 12, name: 'Jawa Barat' },
      { id: 13, name: 'DKI Jakarta' },
      { id: 26, name: 'Sulawesi Selatan' },
    ],

    // Filters
    selectedKey: '',
    selectedProvinsi: '',
    simDate: '',

    // State
    loading: false,
    result: null,
    cuacaData: null,
    bowtieData: null,

    async init() {
      // Auth guard — analyst+ only
      if (!this.token) { window.location.replace('/login'); return; }
      try {
        const r = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + this.token } });
        if (!r.ok) throw new Error();
        const me = await r.json();
        this.user = me;
        // Viewer cannot access FTA page
        if (!me.is_admin && !me.is_analyst) {
          window.location.replace('/');
          return;
        }
      } catch {
        window.location.replace('/login');
        return;
      }

      // Load commodities
      try {
        const r = await fetch('/api/commodities/detail', this._authOpts());
        if (r.ok) {
          this.commodities = await r.json();
          if (this.commodities.length) this.selectedKey = this.commodities[0].key;
        }
      } catch {}
    },

    _authOpts() {
      return { headers: this.token ? { Authorization: 'Bearer ' + this.token } : {} };
    },

    async runRCA() {
      if (!this.selectedKey || this.loading) return;
      this.loading = true;
      this.result = null;
      this.cuacaData = null;
      this.bowtieData = null;

      const dateParam = this.simDate ? `?sim_date=${this.simDate}` : '';

      try {
        // Fetch RCA + commodity data in parallel
        const [rcaRes, comRes] = await Promise.all([
          fetch(`/api/analysis/${this.selectedKey}${dateParam}`, this._authOpts()),
          fetch(`/api/commodity/${this.selectedKey}${dateParam}`, this._authOpts()),
        ]);

        if (!rcaRes.ok) throw new Error('Analysis request failed');
        const rcaData = await rcaRes.json();

        let comData = null;
        if (comRes.ok) comData = await comRes.json();

        // Build result — map API field names to frontend expectations
        // Backend RCAResult uses: price_delta_pct, title, action, checks[]
        // Backend CommodityData has: kota_list[] with naik flags
        const kotaList = comData?.kota_list || [];
        const kotaNaik = kotaList.filter(k => k.naik).length;

        this.result = {
          is_anomaly: rcaData.is_anomaly,
          root_cause: rcaData.title || '',          // RCAResult.title = diagnosis title
          description: rcaData.description || '',    // RCAResult.description = detail
          recommendation: rcaData.action || '',      // RCAResult.action = policy recommendation
          delta_pct: rcaData.price_delta_pct || 0,   // RCAResult.price_delta_pct
          price_now: comData?.price_now || 0,
          kota_naik: kotaNaik,                       // count from CommodityData.kota_list
          total_kota: kotaList.length,                // total from CommodityData.kota_list
          severity_level: rcaData.severity_level || 'L0',
          yes_indicators: rcaData.yes_indicators || [],
          checks: (rcaData.checks || []).map(c => ({
            ...c,
            // Map CheckResult fields: nama→name, status→result (TRIGGERED/CLEAR/SKIP)
            name: c.nama || c.name || '',
            result: (c.status || '').toUpperCase(),
          })),
        };

        // Fetch weather data — always use /api/cuaca for numeric details
        // CommodityData.cuaca only has text description, not numeric values
        const provId = this.selectedProvinsi || 12;  // default to Jawa Barat
        try {
          const wRes = await fetch(`/api/cuaca/${provId}${dateParam}`, this._authOpts());
          if (wRes.ok) {
            const wData = await wRes.json();
            // Merge: use RCA cuaca flags + API weather daily numbers
            const latestDay = (wData.harian && wData.harian.length > 0) ? wData.harian[0] : {};
            this.cuacaData = {
              ekstrem: comData?.cuaca?.ekstrem ?? wData.ekstrem ?? false,
              desc: comData?.cuaca?.desc || wData.ringkasan || '',
              daerah: comData?.cuaca?.daerah || wData.daerah || latestDay.lokasi_label || '',
              detail: {
                precipitation_sum: latestDay.precipitation_sum ?? null,
                temperature_max: latestDay.temperature_max ?? null,
                wind_speed_max: latestDay.wind_speed_max ?? null,
              },
            };
          } else if (comData?.cuaca) {
            // Fallback: use commodity cuaca (text only, no numeric)
            this.cuacaData = comData.cuaca;
          }
        } catch {
          if (comData?.cuaca) this.cuacaData = comData.cuaca;
        }

        // Fetch Bowtie analysis
        try {
          const bRes = await fetch(`/api/bowtie/${this.selectedKey}${dateParam}`, this._authOpts());
          if (bRes.ok) this.bowtieData = await bRes.json();
        } catch {
          this.bowtieData = null;
        }

      } catch (err) {
        console.error('Analysis Error:', err);
      } finally {
        this.loading = false;
      }
    },

    logout() {
      localStorage.removeItem('rca_token');
      localStorage.removeItem('rca_user');
      window.location.replace('/login');
    },
  };
}
</script>
</body>
</html>
