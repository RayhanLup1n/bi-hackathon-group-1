<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — R.A.D.A.R Pangan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #EEF7F1;
      --surface:   #FFFFFF;
      --surface2:  #F0FBF4;
      --border:    #1a1a1a;
      --accent:    #2ECC88;
      --accent2:   #1D7A56;
      --danger:    #F87171;
      --success:   #34D399;
      --text:      #1a1a1a;
      --text2:     #3f3f46;
      --muted:     #71717a;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', system-ui, sans-serif;
      --radius:    16px;
      --radius-sm: 12px;
      --bw:        2.5px;
      --shadow:    4px 4px 0px #1a1a1a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(46,204,136,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(29,122,86,0.08) 0%, transparent 50%),
        radial-gradient(circle at 60% 80%, rgba(52,211,153,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--surface);
      border: var(--bw) solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 6px 6px 0px var(--border);
      animation: slide-up 0.35s ease both;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      width: 56px;
      height: 56px;
      border: var(--bw) solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 0 var(--border);
      margin: 0 auto 18px;
      overflow: hidden;
      padding: 0;
    }
    .login-logo img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .login-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-align: center;
      color: var(--text);
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.5px;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .form-input-wrap { position: relative; }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface);
      border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      box-shadow: 3px 3px 0 var(--border);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .form-input::placeholder { color: var(--muted); font-weight: 400; }
    .form-input:focus {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
    .form-input.error {
      border-color: var(--danger);
      background: #FEE2E2;
    }
    .form-input-pw { padding-right: 46px; }

    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      color: var(--muted);
      padding: 4px 6px;
      transition: color 0.2s;
      line-height: 1;
      border-radius: 6px;
    }
    .pw-toggle:hover { color: var(--accent2); }

    .error-alert {
      display: none;
      background: #FEE2E2;
      border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: #DC2626;
      margin-bottom: 16px;
      align-items: center;
      gap: 8px;
      box-shadow: 2px 2px 0 var(--border);
    }
    .error-alert.show { display: flex; animation: slide-up 0.2s ease; }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #ffffff;
      border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: var(--shadow);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .login-btn:hover:not(:disabled) {
      background: var(--accent2);
    }
    .login-btn:active:not(:disabled) {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--border);
    }
    .login-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: translate(2px, 2px); }

    .demo-hint {
      margin-top: 22px;
      padding: 13px 16px;
      background: var(--surface2);
      border: var(--bw) dashed var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      line-height: 1.9;
      font-weight: 500;
    }
    .demo-hint strong { color: var(--text); font-weight: 800; }
    .demo-hint .role-badge {
      display: inline-block;
      background: #E0F5EA;
      color: var(--accent2);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 4px;
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo"><img src="/assets/temp_logo.jpeg" alt="RADAR Pangan"></div>
    <div class="login-title">R.A.D.A.R Pangan</div>
    <div class="login-subtitle">root cause analysis engine &nbsp;·&nbsp; v0.5</div>

    <div class="error-alert" id="errorAlert">
      <span>⚠</span>
      <span id="errorText">Username atau password salah</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          type="text"
          id="username"
          class="form-input"
          placeholder="Masukkan username"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-input-wrap">
          <input
            type="password"
            id="password"
            class="form-input form-input-pw"
            placeholder="Masukkan password"
            autocomplete="current-password"
            required
          >
          <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePw()" title="Tampilkan password">👁</button>
        </div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span id="loginBtnContent">Masuk →</span>
      </button>
    </form>

    <div class="demo-hint">
      <strong>Akun Demo</strong><br>
      admin / admin123 <span class="role-badge">admin</span><br>
      analyst / analyst123 <span class="role-badge">analyst</span>
    </div>

  </div>
</div>

<script>
  // Redirect jika sudah login
  (function checkExisting() {
    const token = localStorage.getItem('rca_token');
    if (!token) return;
    fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })
      .then(r => r.ok ? r.json() : null)
      .then(me => { if (me) window.location.replace('/'); })
      .catch(() => {});
  })();

  function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('pwToggle');
    const isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁';
    btn.title = isHidden ? 'Sembunyikan password' : 'Tampilkan password';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const content  = document.getElementById('loginBtnContent');
    const alert    = document.getElementById('errorAlert');
    const errText  = document.getElementById('errorText');

    alert.classList.remove('show');
    document.getElementById('username').classList.remove('error');
    document.getElementById('password').classList.remove('error');
    btn.disabled = true;
    content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px;"><div class="spinner"></div> Memeriksa...</div>';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || 'Login gagal');
      }

      localStorage.setItem('rca_token', data.access_token);
      localStorage.setItem('rca_user', JSON.stringify(data.user));
      window.location.replace('/');
    } catch (err) {
      errText.textContent = err.message;
      alert.classList.add('show');
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
      btn.disabled = false;
      content.innerHTML = 'Masuk →';
    }
  }

  // Hapus error state saat user mulai mengetik
  ['username', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('errorAlert').classList.remove('show');
      document.getElementById(id).classList.remove('error');
    });
  });
</script>
</body>
</html>
