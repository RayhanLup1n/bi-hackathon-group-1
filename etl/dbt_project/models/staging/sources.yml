version: 2

sources:
  - name: raw
    description: "Data mentah hasil extraction dari BI PIHPS"
    schema: raw
    tables:
      - name: harga_pangan
        description: "Tabel harga pangan harian per komoditas, kota, dan pasar"
        columns:
          - name: tanggal
            description: "Tanggal pencatatan harga"
            tests: [not_null]
          - name: comcat_id
            description: "ID kategori komoditas dari API PIHPS (format: cat_1, cat_2, ...)"
            tests: [not_null]
          - name: komoditas_nama
            description: "Nama komoditas"
          - name: pasar_tipe
            description: "Tipe pasar: 1=tradisional, 2=modern, 3=pedagang besar, 4=produsen"
          - name: provinsi_id
            description: "ID provinsi"
          - name: provinsi_nama
            description: "Nama provinsi"
          - name: kota_id
            description: "ID kota/kabupaten"
          - name: kota_nama
            description: "Nama kota/kabupaten"
          - name: pasar_nama
            description: "Nama pasar"
          - name: harga
            description: "Harga dalam Rupiah"
          - name: satuan
            description: "Satuan komoditas (kg, liter, dll)"
          - name: _extracted_at
            description: "Timestamp saat data diextract"
          - name: _source
            description: "Sumber data"

      - name: dim_provinsi
        description: "Dimensi provinsi"
        columns:
          - name: provinsi_id
            tests: [not_null, unique]
          - name: provinsi_nama
            tests: [not_null]

      - name: dim_kota
        description: "Dimensi kota/kabupaten"
        columns:
          - name: kota_id
            tests: [not_null, unique]
          - name: kota_nama
            tests: [not_null]
