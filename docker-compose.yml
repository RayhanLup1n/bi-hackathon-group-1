# ============================================================
# Docker Compose - R.A.D.A.R Pangan
#
# Services:
#   app          - FastAPI backend + frontend (always runs)
#   ml-model     - ML inference server (profile: ml)
#   kestra       - ETL orchestrator + UI (profile: etl)
#
# Usage:
#   docker compose up app                    # App only
#   docker compose --profile ml up           # App + ML model
#   docker compose --profile etl up          # App + Kestra ETL
#   docker compose --profile ml --profile etl up  # Everything
#
# Kestra UI: http://localhost:8080 (admin / kestra)
# ============================================================

services:
  # ─────────────────────────────────────────
  # FastAPI App (Backend + Frontend)
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-pangan-app
    ports:
      - "8000:8000"
    env_file:
      - .envs/.env
    environment:
      - PYTHONUNBUFFERED=1
      # BigQuery config (override via .env if needed)
      - GCP_PROJECT=${GCP_PROJECT:-radar-pangan-hackathon}
      - BQ_LOCATION=${BQ_LOCATION:-asia-southeast2}
      # ML server URL (Docker service name for inter-container communication)
      - ML_SERVER_URL=http://ml-model:8001
    volumes:
      # Credentials (read-only)
      - ./.envs:/app/.envs:ro
      # GCP Application Default Credentials for BigQuery access
      # Windows: %APPDATA%/gcloud/application_default_credentials.json
      # Linux/macOS: ~/.config/gcloud/application_default_credentials.json
      - ${GOOGLE_APPLICATION_CREDENTIALS_DIR:-~/.config/gcloud}:/root/.config/gcloud:ro
      # Frontend hot-reload during development (remove in production)
      - ./frontend:/app/frontend:ro
    networks:
      - radar-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # ML Inference Server (teammate managed)
  #
  # Activate with: docker compose --profile ml up
  #
  # Contract:
  #   - Expose port 8001
  #   - GET  /health            -> pipeline status
  #   - POST /api/v1/analyze    -> single analysis
  #   - POST /api/v1/batch      -> batch analysis
  #   - GET  /api/v1/alerts     -> active alerts
  #   - GET  /api/v1/summary/*  -> daily summary
  #   - GET  /api/v1/komoditas  -> available commodities
  #   - GET  /api/v1/kota       -> available cities
  #   - FastAPI app proxies via /api/ml/*
  # ─────────────────────────────────────────
  ml-model:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: radar-pangan-ml
    ports:
      - "8001:8001"
    env_file:
      - .envs/.env
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PORT=8001
      # Paths relative to WORKDIR (/app) - ml code is at /app/ml/
      - ML_MODELS_DIR=ml/models
      - ML_HET_CSV=ml/data/het_reference.csv
      # LLM config (override via .env or docker-compose override)
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_MODEL=${LLM_MODEL:-google/gemini-2.5-flash}
    volumes:
      - ./ml/models:/app/ml/models:ro
    networks:
      - radar-network
    restart: unless-stopped
    profiles:
      - ml
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  # Kestra PostgreSQL (metadata store)
  # ─────────────────────────────────────────
  kestra-postgres:
    image: postgres:16-alpine
    container_name: radar-kestra-postgres
    environment:
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
      POSTGRES_DB: kestra
    volumes:
      - kestra-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kestra"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - radar-network
    restart: unless-stopped
    profiles:
      - etl

  # ─────────────────────────────────────────
  # Kestra Orchestrator (server + worker + UI)
  #
  # Activate with: docker compose --profile etl up
  #
  # Custom image: Kestra + Python 3.11 + dbt-bigquery
  # Process runner: scripts run inside this container
  # UI: http://localhost:8080
  #
  # Import flows after startup:
  #   curl -X POST http://localhost:8080/api/v1/flows/import \
  #     -F "fileUpload=@etl/kestra/flows/radar_pangan_full_pipeline.yml"
  #   curl -X POST http://localhost:8080/api/v1/flows/import \
  #     -F "fileUpload=@etl/kestra/flows/radar_pangan_daily.yml"
  # ─────────────────────────────────────────
  kestra:
    build:
      context: ./etl/kestra
      dockerfile: Dockerfile
    container_name: radar-kestra
    user: "root"
    command: server standalone --worker-thread=128
    ports:
      - "8080:8080"
    env_file:
      - .envs/.env
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-postgres:5432/kestra
            driver-class-name: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          security:
            basic-auth:
              enabled: true
              username: admin@radar-pangan.local
              password: "Admin1234"
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
      # BigQuery config
      GCP_PROJECT: ${GCP_PROJECT:-radar-pangan-hackathon}
      BQ_LOCATION: ${BQ_LOCATION:-asia-southeast2}
      PYTHONUNBUFFERED: "1"
    volumes:
      - kestra-data:/app/storage
      # Mount entire project for Process runner access
      - .:/app/project:ro
      # Kestra working directory
      - /tmp/kestra-wd:/tmp/kestra-wd
      # GCP Application Default Credentials for BigQuery
      # Windows: set GOOGLE_APPLICATION_CREDENTIALS_DIR=%APPDATA%/gcloud
      # Linux/macOS: uses default ~/.config/gcloud
      - ${GOOGLE_APPLICATION_CREDENTIALS_DIR:-~/.config/gcloud}:/root/.config/gcloud:ro
    depends_on:
      kestra-postgres:
        condition: service_healthy
    networks:
      - radar-network
    restart: unless-stopped
    profiles:
      - etl

networks:
  radar-network:
    driver: bridge

volumes:
  kestra-postgres-db:
    driver: local
  kestra-data:
    driver: local
