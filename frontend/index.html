<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R.A.D.A.R Pangan — Executive Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    /* ── Dashboard layout ── */
    .dash-top-bar {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .dash-stat {
      flex: 1; min-width: 140px;
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .dash-stat::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--accent);
    }
    .dash-stat.critical::after { background: var(--danger); }
    .dash-stat.warning::after { background: var(--warn); }
    .dash-stat .stat-num { font-family: var(--mono); font-size: 28px; font-weight: 800; }
    .dash-stat .stat-label { font-family: var(--sans); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 4px; }

    /* ── Freshness indicator ── */
    .freshness-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 10px 16px; margin-bottom: 16px;
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      font-family: var(--sans); font-size: 12px; font-weight: 500;
    }
    .freshness-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }
    .freshness-dot.fresh { background: #34D399; }
    .freshness-dot.stale { background: #FBBF24; }
    .freshness-dot.very-stale { background: #F87171; }

    /* ── Priority card ── */
    .priority-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      box-shadow: var(--shadow); margin-bottom: 12px;
      cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
      position: relative; overflow: hidden;
    }
    .priority-card:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-lg); }
    .priority-card::before {
      content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 5px;
    }
    .priority-card.risk-kritis::before { background: #DC2626; }
    .priority-card.risk-tinggi::before { background: #F59E0B; }
    .priority-card.risk-sedang::before { background: #6366F1; }
    .priority-card.risk-rendah::before { background: #34D399; }

    .priority-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .priority-rank {
      font-family: var(--mono); font-size: 12px; font-weight: 800; color: var(--muted);
      letter-spacing: 1px; margin-bottom: 2px;
    }
    .priority-name { font-size: 17px; font-weight: 900; letter-spacing: -0.3px; line-height: 1.2; }
    .priority-region { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 2px; }

    .priority-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
    .priority-tag {
      font-family: var(--mono); font-size: 10px; font-weight: 800; text-transform: uppercase;
      padding: 3px 8px; border-radius: 6px; border: 1.5px solid var(--border);
      letter-spacing: 0.5px;
    }
    .tag-risk-kritis { background: #FEE2E2; color: #DC2626; }
    .tag-risk-tinggi { background: #FEF3C7; color: #B45309; }
    .tag-risk-sedang { background: #E0E7FF; color: #4338CA; }
    .tag-risk-rendah { background: #D1FAE5; color: #059669; }
    .tag-confidence-high { background: #D1FAE5; color: #059669; }
    .tag-confidence-medium { background: #FEF3C7; color: #B45309; }
    .tag-confidence-low { background: #FEE2E2; color: #DC2626; }

    .priority-score {
      font-family: var(--mono); font-size: 22px; font-weight: 800;
      margin-left: auto; flex-shrink: 0;
    }
    .priority-next-step {
      font-family: var(--sans); font-size: 13px; color: var(--text2);
      margin-top: 8px; padding: 8px 10px; background: var(--surface2);
      border-radius: 8px; border: 1.5px solid var(--border);
      font-weight: 500; line-height: 1.5;
    }

    /* ── Evidence section (detail page) ── */
    .evidence-block {
      margin-bottom: 16px;
    }
    .evidence-block h3 {
      font-family: var(--mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .evidence-block h3::before {
      content: ''; display: inline-block; width: 4px; height: 12px;
      border-radius: 2px; border: 1px solid var(--border);
    }
    .evidence-block.facts h3::before { background: #34D399; }
    .evidence-block.models h3::before { background: #6366F1; }
    .evidence-block.factors h3::before { background: #F59E0B; }
    .evidence-block.missing h3::before { background: #F87171; }

    .evidence-item {
      padding: 8px 12px; margin-bottom: 4px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 13px; font-family: var(--sans);
    }
    .evidence-tag {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      text-transform: uppercase; padding: 1px 6px; border-radius: 4px;
      border: 1px solid var(--border); margin-right: 6px;
    }
    .etag-fact { background: #D1FAE5; color: #059669; }
    .etag-model { background: #E0E7FF; color: #4338CA; }
    .etag-inference { background: #FEF3C7; color: #B45309; }
    .etag-missing { background: #FEE2E2; color: #DC2626; }

    /* ── Response option cards ── */
    .response-option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; margin-bottom: 6px;
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: 8px; box-shadow: 2px 2px 0 var(--border);
    }
    .response-icon {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      padding: 4px 8px; border-radius: 6px; border: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Bundle card ── */
    .bundle-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow); margin-bottom: 10px;
    }
    .bundle-title { font-size: 15px; font-weight: 900; margin-bottom: 4px; }
    .bundle-reason { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
    .bundle-items { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Review buttons ── */
    .review-btn {
      font-family: var(--sans); font-size: 12px; font-weight: 600;
      padding: 8px 14px; border: var(--bw) solid var(--border);
      border-radius: 8px; cursor: pointer;
      box-shadow: 2px 2px 0 var(--border);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .review-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--border); }
    .review-btn.bahas { background: #D1FAE5; color: #059669; }
    .review-btn.bahas:hover { background: #A7F3D0; }
    .review-btn.tunda { background: #FEF3C7; color: #B45309; }
    .review-btn.tunda:hover { background: #FDE68A; }
    .review-btn.tolak { background: #FEE2E2; color: #DC2626; }
    .review-btn.tolak:hover { background: #FECACA; }
    .review-btn.active-review { box-shadow: inset 2px 2px 0 var(--border); transform: translate(2px, 2px); }

    /* ── Filter bar - layout only, styling via .form-select in style.css ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

    /* ── Section heading ── */
    .section-head {
      font-family: var(--mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px; font-weight: 800;
    }
    .section-head::after {
      content: ''; flex: 1; height: 2px; background: var(--border);
      opacity: 0.15;
    }

    /* ── Skeleton - now in style.css, keep local overrides only ── */

    /* ── Error / stale banner ── */
    .stale-banner {
      padding: 10px 16px; margin-bottom: 16px;
      background: #FEF3C7; border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      font-family: var(--mono); font-size: 10px; font-weight: 600; color: #92400E;
      display: flex; align-items: center; gap: 8px;
    }
    .offline-banner {
      padding: 10px 16px; margin-bottom: 16px;
      background: #FEE2E2; border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      font-family: var(--mono); font-size: 10px; font-weight: 600; color: #DC2626;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Review note textarea ── */
    .review-note-input {
      width: 100%; min-height: 60px; margin-top: 8px;
      background: var(--surface); border: var(--bw) solid var(--border);
      font-family: var(--sans); font-size: 12px; padding: 8px 10px;
      border-radius: 8px; resize: vertical;
    }

    /* ── Mobile hamburger ── */
    .hamburger-btn {
      display: none;
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 10px;
      font-size: 20px; cursor: pointer; box-shadow: 2px 2px 0 var(--border);
      line-height: 1;
    }
    .mobile-nav {
      display: none;
      flex-direction: column; gap: 6px;
      padding: 12px; background: var(--surface);
      border: var(--bw) solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .mobile-nav.show { display: flex; }

    /* ── Responsive breakpoints ── */
    @media (max-width: 768px) {
      .app { padding: 12px 12px 32px; }

      /* Hamburger nav */
      .header-right { display: none; }
      .hamburger-btn { display: block; }
      .header { flex-wrap: wrap; }

      /* Priority card compact */
      .priority-card { padding: 12px 14px; }
      .priority-name { font-size: 15px; }
      .priority-score { font-size: 18px; }
      .priority-meta { gap: 4px; }

      /* Detail header compact */
      .detail-commodity { font-size: 20px; }
      .detail-scores { gap: 12px; }
      .detail-score-val { font-size: 16px; }

      /* Filter bar stacked */
      .filter-bar { flex-direction: column; }
      .filter-bar .form-select { max-width: 100% !important; }

      /* Search full-width */
      .search-bar > div { max-width: 100% !important; }
    }

    @media (max-width: 480px) {
      .dash-top-bar { flex-direction: column; }
      .dash-top-bar .dash-stat { min-width: 100%; }
      .header-title { font-size: 15px; }
      .priority-name { font-size: 14px; }
      .header { padding: 10px 14px; }
    }

    /* ── Detail page header ── */
    .detail-header {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .detail-commodity { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
    .detail-region { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .detail-scores { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 12px; }
    .detail-score-item { text-align: center; }
    .detail-score-val { font-family: var(--mono); font-size: 20px; font-weight: 800; }
    .detail-score-lbl { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }

    /* ── Back link ── */
    .back-link {
      font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--accent2);
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      margin-bottom: 12px;
    }
    .back-link:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ── Review status indicator ── */
    .review-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      padding: 5px 10px; border-radius: 6px; border: 1.5px solid var(--border);
    }
    .review-status.belum { background: #F4F4F5; color: var(--muted); }
    .review-status.bahas { background: #D1FAE5; color: #059669; }
    .review-status.tunda { background: #FEF3C7; color: #B45309; }
    .review-status.tolak { background: #FEE2E2; color: #DC2626; }

    /* ── Empty state ── */
    .empty-card {
      text-align: center; padding: 40px 20px;
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      font-family: var(--sans); font-size: 14px; color: var(--muted);
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     EXECUTIVE DASHBOARD — Single Alpine.js app
     Route: / (dashboard) or /detail/{recommendation_id}
     ═══════════════════════════════════════════════════════════════════════ -->
<div class="app" x-data="executiveDashboard()" x-init="init()">

  <!-- ── Header ── -->
  <header class="header" x-data="{ navOpen: false }">
    <div class="header-left">
      <div class="logo-icon"><img src="/assets/logo.png" alt="RADAR Pangan"></div>
      <div>
        <div class="header-title">R.A.D.A.R Pangan</div>
        <div class="header-sub">decision-support &middot; v0.8</div>
      </div>
    </div>
    <div class="header-right">
      <span class="user-badge">
        <strong x-text="user?.username || '—'"></strong> &middot; <span x-text="user?.role || ''"></span>
      </span>
      <a href="/" class="nav-link" :class="page === 'dashboard' ? 'nav-link-active' : 'nav-link-default'">Dashboard</a>
      <a href="/guide" class="nav-link nav-link-default">Panduan</a>
      <template x-if="user?.is_admin || user?.role === 'admin'">
        <a href="/admin" class="nav-link nav-link-default">Admin</a>
      </template>
      <button @click="logout()" class="nav-link nav-link-danger">Keluar</button>
    </div>
    <!-- Hamburger (mobile only) -->
    <button class="hamburger-btn" @click="navOpen = !navOpen" aria-label="Toggle navigation">
      <span x-text="navOpen ? '✕' : '☰'"></span>
    </button>
    <!-- Mobile nav dropdown -->
    <div class="mobile-nav" :class="navOpen ? 'show' : ''" style="width:100%;margin-top:10px;">
      <a href="/" class="nav-link" :class="page === 'dashboard' ? 'nav-link-active' : 'nav-link-default'" @click="navOpen = false">Dashboard</a>
      <a href="/guide" class="nav-link nav-link-default" @click="navOpen = false">Panduan</a>
      <template x-if="user?.is_admin || user?.role === 'admin'">
        <a href="/admin" class="nav-link nav-link-default" @click="navOpen = false">Admin</a>
      </template>
      <button @click="logout(); navOpen = false" class="nav-link nav-link-danger">Keluar</button>
    </div>
  </header>

  <!-- ═══════════ DASHBOARD VIEW ═══════════ -->
  <template x-if="page === 'dashboard'">
    <div>

    <!-- ── Service warnings ── -->
    <template x-if="overview">
      <div>
        <div class="offline-banner" x-show="overview.service_health.ml_service === 'offline'">
          <span>⚠️</span> ML service offline — confidence dan forecast dibatasi. Monitoring historis tetap tersedia.
        </div>
        <div class="stale-banner" x-show="overview.data_freshness.status === 'stale' || overview.data_freshness.status === 'very_stale'">
          <span x-text="overview.data_freshness.status === 'very_stale' ? '🔴' : '🟡'"></span>
          Data terakhir: <strong x-text="overview.data_freshness.latest_date"></strong>
          (<span x-text="overview.data_freshness.age_days + ' hari lalu'"></span>) — confidence dibatasi.
        </div>
      </div>
    </template>

    <!-- ── Loading skeleton ── -->
    <template x-if="loading && !overview">
      <div>
        <!-- Stat bar skeleton -->
        <div style="display:flex;gap:12px;margin-bottom:20px;">
          <div class="skeleton" style="flex:1;height:70px;border-radius:var(--radius);"></div>
          <div class="skeleton" style="flex:1;height:70px;border-radius:var(--radius);"></div>
          <div class="skeleton" style="flex:1;height:70px;border-radius:var(--radius);"></div>
        </div>
        <!-- Freshness bar skeleton -->
        <div class="skeleton" style="height:38px;margin-bottom:16px;border-radius:var(--radius);"></div>
        <!-- Search bar skeleton -->
        <div class="skeleton" style="height:36px;max-width:420px;margin-bottom:14px;border-radius:var(--radius);"></div>
        <!-- Section label skeleton -->
        <div class="skeleton" style="height:14px;width:140px;margin-bottom:12px;border-radius:4px;"></div>
        <!-- Priority cards skeleton -->
        <div class="skeleton" style="height:130px;margin-bottom:12px;border-radius:var(--radius);"></div>
        <div class="skeleton" style="height:130px;margin-bottom:12px;border-radius:var(--radius);"></div>
        <div class="skeleton" style="height:130px;margin-bottom:12px;border-radius:var(--radius);"></div>
        <!-- Loading text -->
        <div style="text-align:center;margin-top:20px;">
          <span class="spinner" style="border-color:rgba(26,26,26,0.15);border-top-color:var(--accent2);width:20px;height:20px;border-width:2.5px;"></span>
          <p style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:10px;">Memuat dashboard...</p>
        </div>
      </div>
    </template>

    <!-- ── Error state ── -->
    <template x-if="error && !overview">
      <div class="empty-card">
        <p style="font-size:16px;font-weight:700;margin-bottom:8px;">⚠️ Gagal memuat dashboard</p>
        <p x-text="error"></p>
        <button class="btn btn-primary" style="margin-top:12px;" @click="loadOverview()">Coba Lagi</button>
      </div>
    </template>

    <!-- ── Dashboard content ── -->
    <template x-if="overview">
      <div class="animate-in">

      <!-- ── Top stat bar ── -->
      <div class="dash-top-bar">
        <div class="dash-stat">
          <div class="stat-num" x-text="overview.summary.total_commodities"></div>
          <div class="stat-label">Komoditas Dipantau</div>
        </div>
        <div class="dash-stat" :class="overview.summary.has_critical ? 'critical' : (overview.summary.has_high ? 'warning' : '')">
          <div class="stat-num" :style="overview.summary.has_critical ? 'color:#DC2626;' : ''"
               x-text="(overview.summary.risk_counts.kritis || 0) + (overview.summary.risk_counts.tinggi || 0)"></div>
          <div class="stat-label">Risiko Tinggi/Kritis</div>
        </div>
        <div class="dash-stat">
          <div class="stat-num" x-text="overview.data_freshness.coverage_ratio != null ? (overview.data_freshness.coverage_ratio * 100).toFixed(0) + '%' : '—'"></div>
          <div class="stat-label">Cakupan Data</div>
        </div>
      </div>

      <!-- ── Freshness bar (redesigned: 2 rows for readability) ── -->
      <div class="freshness-bar" style="display:block;">
        <!-- Row 1: Data metadata -->
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
          <span class="freshness-dot" :class="overview.data_freshness.status"></span>
          <span style="font-weight:600;">Data: <strong x-text="overview.data_freshness.latest_date"></strong></span>
          <span style="color:var(--muted);font-size:10px;" x-text="'(' + overview.data_freshness.age_days + ' hari lalu)'"></span>
          <span>ML:
            <strong :style="overview.service_health.ml_service === 'online' ? 'color:#059669;' : 'color:#DC2626;'"
                    x-text="overview.service_health.ml_service"></strong>
          </span>
          <a href="#" style="margin-left:auto;font-size:12px;color:var(--accent2);font-weight:700;" @click.prevent="showTransparency = !showTransparency">
            <span x-text="showTransparency ? 'Sembunyikan Detail' : 'Transparansi Data'"></span> →
          </a>
        </div>
        <!-- Row 2: Risk distribution bar -->
        <div style="display:flex;align-items:center;gap:0;">
          <div style="flex:1;height:8px;display:flex;border-radius:4px;overflow:hidden;border:1px solid var(--border);">
            <div style="background:#34D399;" :style="'width:' + ((overview.summary.risk_counts.rendah || 0) / overview.summary.total_entries * 100) + '%'" x-show="(overview.summary.risk_counts.rendah || 0) > 0"></div>
            <div style="background:#6366F1;" :style="'width:' + ((overview.summary.risk_counts.sedang || 0) / overview.summary.total_entries * 100) + '%'" x-show="(overview.summary.risk_counts.sedang || 0) > 0"></div>
            <div style="background:#F59E0B;" :style="'width:' + ((overview.summary.risk_counts.tinggi || 0) / overview.summary.total_entries * 100) + '%'" x-show="(overview.summary.risk_counts.tinggi || 0) > 0"></div>
            <div style="background:#DC2626;" :style="'width:' + ((overview.summary.risk_counts.kritis || 0) / overview.summary.total_entries * 100) + '%'" x-show="(overview.summary.risk_counts.kritis || 0) > 0"></div>
          </div>
        </div>
        <div style="display:flex;gap:14px;margin-top:6px;font-size:11px;">
          <span>● <span x-text="(overview.summary.risk_counts.rendah || 0)"></span> Rendah</span>
          <span>◆ <span x-text="(overview.summary.risk_counts.sedang || 0)"></span> Sedang</span>
          <span>▲ <span x-text="(overview.summary.risk_counts.tinggi || 0)"></span> Tinggi</span>
          <span style="color:#DC2626;">■ <span x-text="(overview.summary.risk_counts.kritis || 0)"></span> Kritis</span>
        </div>
      </div>

      <!-- ── Search bar ── -->
      <div class="search-bar" style="position:relative;margin-bottom:16px;">
        <div style="position:relative;max-width:480px;">
          <input type="text"
                 x-model="searchQuery"
                 @input="doSearch()"
                 @keydown.escape="searchQuery=''; searchResults=[]; searchNoResults=false;"
                 placeholder="Cari komoditas, provinsi, atau level risiko..."
                 class="search-input"
                 style="width:100%;padding:11px 40px 11px 38px;background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:14px;box-shadow:var(--shadow);outline:none;">
          <!-- Search icon (left) -->
          <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);pointer-events:none;">🔍</span>
          <!-- Search loading spinner (right) -->
          <div x-show="searchLoading"
               style="position:absolute;right:12px;top:50%;transform:translateY(-50%);">
            <span class="spinner" style="border-color:rgba(26,26,26,0.2);border-top-color:var(--accent2);width:14px;height:14px;border-width:2px;"></span>
          </div>
        </div>
        <!-- Search results dropdown -->
        <div class="search-dropdown" x-show="searchResults.length > 0"
             @click.outside="searchResults=[]"
             x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="opacity-0 transform -translate-y-1"
             x-transition:enter-end="opacity-100 transform translate-y-0"
             style="position:absolute;top:100%;left:0;max-width:420px;width:100%;background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);z-index:100;max-height:320px;overflow-y:auto;margin-top:4px;">
          <template x-for="r in searchResults" :key="r.recommendation_id">
            <div @click="openDetail(r.recommendation_id); searchQuery=''; searchResults=[];"
                 style="display:flex;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;border-bottom:1px solid #e5e5e5;font-family:var(--sans);font-size:13px;transition:background 0.1s;"
                 class="search-result-item">
              <span x-text="r.commodity" style="font-weight:700;"></span>
              <span style="font-size:10px;color:var(--muted);" x-text="r.region"></span>
              <span class="priority-tag" :class="'tag-risk-' + r.risk_level" x-text="r.risk_level" style="font-size:8px;"></span>
              <span style="margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--muted);" x-text="'Score: ' + r.relevance_score"></span>
            </div>
          </template>
        </div>
        <!-- No results message -->
        <div x-show="searchNoResults && !searchLoading && searchQuery.trim().length >= 2"
             style="position:absolute;top:100%;left:0;max-width:420px;width:100%;background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);z-index:100;margin-top:4px;padding:14px 16px;font-family:var(--mono);font-size:11px;color:var(--muted);">
          Tidak ada hasil untuk "<span x-text="searchQuery" style="font-weight:700;color:var(--text);"></span>"
        </div>
      </div>

      <!-- ── Export buttons ── -->
      <div class="export-buttons" style="display:flex;gap:6px;margin-bottom:14px;">
        <button @click="exportPriorities('csv')" style="font-family:var(--mono);font-size:10px;font-weight:700;padding:6px 12px;background:var(--surface);border:var(--bw) solid var(--border);border-radius:6px;cursor:pointer;box-shadow:1px 1px 0 var(--border);">📥 CSV</button>
        <button @click="exportPriorities('xlsx')" style="font-family:var(--mono);font-size:10px;font-weight:700;padding:6px 12px;background:var(--surface);border:var(--bw) solid var(--border);border-radius:6px;cursor:pointer;box-shadow:1px 1px 0 var(--border);">📊 Excel</button>
      </div>

      <!-- ── Top 3 Priorities ── -->
      <div class="section-head" style="margin-top:20px;">Prioritas Utama</div>

      <template x-if="overview.top_priorities.length === 0">
        <div class="empty-card">Tidak ada prioritas risiko tinggi saat ini. Semua komoditas dalam kondisi normal.</div>
      </template>

      <template x-for="(p, idx) in overview.top_priorities" :key="p.recommendation_id">
        <div class="priority-card animate-in"
             :class="'risk-' + p.risk_level"
             :style="'animation-delay:' + (idx * 0.08) + 's'"
             @click="openDetail(p.recommendation_id)">
          <div class="priority-header">
            <div>
              <div class="priority-rank" x-text="'#' + (idx + 1) + ' · ' + p.price_condition"></div>
              <div class="priority-name" x-text="p.commodity"></div>
              <div class="priority-region" x-text="p.region"></div>
            </div>
            <div class="priority-score" :style="'color:' + riskColor(p.risk_level)"
                 x-text="p.display_priority_score"></div>
          </div>
          <div class="priority-meta">
            <span class="priority-tag" :class="'tag-risk-' + p.risk_level"><span x-text="riskIcon(p.risk_level)"></span> <span x-text="p.risk_level.toUpperCase()"></span></span>
            <span class="priority-tag" :class="'tag-confidence-' + p.confidence_level" x-text="'Confidence: ' + p.confidence_level"></span>
            <span class="priority-tag" style="background:var(--surface2);" x-text="p.time_horizon_days + ' hari'"></span>
            <span style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;"
                  x-text="p.knowledge_status === 'fact' ? '📋 Fakta' : p.knowledge_status === 'model_output' ? '🤖 Model' : '🔍 Inference'"></span>
          </div>
          <!-- Sparkline -->
          <div x-show="sparklines[p.recommendation_id] && sparklines[p.recommendation_id].length >= 2" style="margin-top:8px;">
            <svg width="100%" height="24" viewBox="0 0 100 24" preserveAspectRatio="none" style="display:block;">
              <polyline :points="sparklinePoints(p.recommendation_id)"
                        fill="none" :stroke="riskColor(p.risk_level)" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
            </svg>
          </div>
          <div class="priority-next-step" x-text="'→ ' + p.next_step"></div>
        </div>
      </template>

      <!-- ── Review bundles (flagship feature - positioned prominently) ── -->
      <template x-if="overview.review_bundles.length > 0">
        <div>
          <div class="section-head" style="margin-top:24px;">Paket Tinjauan Bersama</div>
          <template x-for="b in overview.review_bundles" :key="b.name">
            <div class="bundle-card">
              <div class="bundle-title" x-text="b.name"></div>
              <div class="bundle-reason" x-text="b.reason"></div>
              <div class="bundle-items">
                <template x-for="c in b.commodities" :key="c.name">
                  <span class="priority-tag" :class="'tag-risk-' + c.risk_level"
                        @click="openDetail(c.recommendation_id)"
                        style="cursor:pointer;"
                        :title="'Lihat detail ' + c.name"
                        x-text="c.name + ' (' + c.display_priority_score + ')'"></span>
                </template>
              </div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:8px;">
                ⚠ <span x-text="b.missing_information.join(' · ')"></span>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- ── Full priority list ── -->
      <div class="section-head" style="margin-top:24px;">Daftar Prioritas Lengkap</div>
      <div class="filter-bar" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
        <select x-model="filterRisk" @change="loadPriorities()"
                class="form-select"
                :class="filterRisk ? 'filter-active' : ''"
                :disabled="prioritiesLoading"
                style="flex:1;min-width:140px;max-width:200px;">
          <option value="">Semua Risiko</option>
          <option value="kritis">Kritis</option>
          <option value="tinggi">Tinggi</option>
          <option value="sedang">Sedang</option>
          <option value="rendah">Rendah</option>
        </select>
        <select x-model="filterProvince" @change="loadPriorities()"
                class="form-select"
                :class="filterProvince ? 'filter-active' : ''"
                :disabled="prioritiesLoading"
                style="flex:1;min-width:140px;max-width:200px;">
          <option value="">Semua Provinsi</option>
          <template x-for="pv in overview.provinces" :key="pv.id">
            <option :value="pv.name" x-text="pv.name"></option>
          </template>
        </select>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);padding:8px 0;display:flex;align-items:center;gap:6px;">
          <template x-if="prioritiesLoading">
            <span class="spinner" style="border-color:rgba(26,26,26,0.2);border-top-color:var(--accent2);width:12px;height:12px;border-width:2px;"></span>
          </template>
          <span x-text="prioritiesLoading ? 'Memuat...' : allPriorities.length + ' hasil'"></span>
        </span>
        <!-- Clear filters button -->
        <button x-show="filterRisk || filterProvince"
                @click="filterRisk=''; filterProvince=''; loadPriorities();"
                style="font-family:var(--mono);font-size:9px;font-weight:700;padding:5px 10px;background:#FEE2E2;color:#DC2626;border:var(--bw) solid var(--border);border-radius:6px;cursor:pointer;box-shadow:1px 1px 0 var(--border);">
          Reset Filter
        </button>
      </div>

      <template x-if="allPriorities.length === 0 && !prioritiesLoading">
        <div class="empty-card">
          <template x-if="filterRisk || filterProvince">
            <span>Tidak ada hasil dengan filter aktif. <a href="#" @click.prevent="filterRisk=''; filterProvince=''; loadPriorities();" style="color:var(--accent2);font-weight:700;">Reset filter</a></span>
          </template>
          <template x-if="!filterRisk && !filterProvince">
            <span>Tidak ada data prioritas tersedia saat ini.</span>
          </template>
        </div>
      </template>

      <div :class="prioritiesLoading ? 'priorities-loading' : ''">
      <template x-for="p in allPriorities" :key="p.recommendation_id">
        <div class="priority-card animate-in" :class="'risk-' + p.risk_level"
             style="padding:12px 16px;margin-bottom:6px;"
             @click="openDetail(p.recommendation_id)">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:700;" x-text="'#' + p.rank"></span>
            <div style="flex:1;min-width:0;">
              <span style="font-size:14px;font-weight:700;" x-text="p.commodity"></span>
              <span style="font-size:10px;color:var(--muted);margin-left:6px;" x-text="p.region"></span>
            </div>
            <!-- Mini sparkline in compact list -->
            <div x-show="sparklines[p.recommendation_id] && sparklines[p.recommendation_id].length >= 2"
                 style="width:60px;flex-shrink:0;display:none;"
                 :style="{display: sparklines[p.recommendation_id] && sparklines[p.recommendation_id].length >= 2 ? 'block' : 'none'}">
              <svg width="60" height="18" viewBox="0 0 100 24" preserveAspectRatio="none" style="display:block;">
                <polyline :points="sparklinePoints(p.recommendation_id)"
                          fill="none" :stroke="riskColor(p.risk_level)" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
              </svg>
            </div>
            <span class="priority-tag" :class="'tag-risk-' + p.risk_level" x-text="p.risk_level"></span>
            <span style="font-family:var(--mono);font-size:14px;font-weight:700;" :style="'color:' + riskColor(p.risk_level)"
                  x-text="p.display_priority_score"></span>
          </div>
        </div>
      </template>
      </div><!-- /priorities-loading wrapper -->

      <!-- ── Latest reviews ── -->
      <template x-if="overview.latest_reviews.length > 0">
        <div>
          <div class="section-head" style="margin-top:24px;">Review Terbaru</div>
          <template x-for="r in overview.latest_reviews" :key="r.id">
            <div class="evidence-item" style="display:flex;align-items:center;justify-content:space-between;">
              <div>
                <span class="review-status" :class="statusClass(r.status)" x-text="r.status"></span>
                <span style="font-family:var(--mono);font-size:10px;margin-left:8px;color:var(--text2);" x-text="r.recommendation_id"></span>
              </div>
              <span style="font-family:var(--mono);font-size:9px;color:var(--muted);" x-text="r.created_at?.substring(0,10)"></span>
            </div>
          </template>
        </div>
      </template>

      <!-- ── Transparency panel (expandable) ── -->
      <template x-if="showTransparency">
        <div class="animate-in" style="margin-top:20px;" x-data="{}" x-init="loadTransparency()">
          <div class="section-head">Transparansi Data & Model</div>
          <template x-if="transparencyData">
            <div class="card">
              <div class="card-label">Sumber Data</div>
              <template x-for="ds in transparencyData.data_sources" :key="ds.name">
                <div class="evidence-item" style="margin-bottom:4px;">
                  <strong x-text="ds.name"></strong> — <span x-text="ds.type"></span>
                  <div style="font-size:10px;color:var(--muted);margin-top:2px;">
                    Update: <span x-text="ds.update_cadence"></span> ·
                    Terbaru: <span x-text="ds.latest_data"></span> ·
                    Cakupan: <span x-text="ds.coverage"></span>
                  </div>
                </div>
              </template>

              <div class="card-label" style="margin-top:12px;">Konfigurasi Prioritas</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-family:var(--mono);font-size:10px;">
                <template x-for="(w, name) in transparencyData.priority_config.weights" :key="name">
                  <div class="evidence-item" style="font-size:10px;">
                    <span x-text="name"></span>: <strong x-text="(w * 100).toFixed(0) + '%'"></strong>
                  </div>
                </template>
              </div>

              <div class="card-label" style="margin-top:12px;">Keterbatasan</div>
              <template x-for="lim in transparencyData.known_limitations" :key="lim">
                <div class="evidence-item" style="font-size:10px;" x-text="'• ' + lim"></div>
              </template>

              <div style="margin-top:8px;font-family:var(--mono);font-size:9px;color:var(--warn);padding:6px 10px;background:#FEF3C7;border-radius:6px;border:1.5px solid var(--border);"
                   x-text="transparencyData.knowledge_status_note"></div>
            </div>
          </template>
        </div>
      </template>

      </div>
    </template>  <!-- end dashboard content -->

    </div>
  </template>  <!-- end dashboard view -->

  <!-- ═══════════ DETAIL VIEW ═══════════ -->
  <template x-if="page === 'detail'">
    <div>

      <!-- Loading -->
      <template x-if="detailLoading">
        <div>
          <div class="skeleton" style="height:100px;margin-bottom:14px;"></div>
          <div class="skeleton" style="height:200px;margin-bottom:14px;"></div>
        </div>
      </template>

      <!-- Error -->
      <template x-if="detailError">
        <div class="empty-card">
          <p style="font-size:16px;font-weight:700;margin-bottom:8px;">⚠️ Gagal memuat detail</p>
          <p x-text="detailError"></p>
          <button class="btn btn-primary" style="margin-top:12px;" @click="openDetail(detailId)">Coba Lagi</button>
          <br>
          <a href="/" class="back-link" style="margin-top:12px;">← Kembali ke Dashboard</a>
        </div>
      </template>

      <!-- Detail content -->
      <template x-if="detail && !detailLoading">
        <div>
          <a href="/" class="back-link" @click.prevent="page='dashboard'; history.pushState({},'','/'); window.scrollTo({top:0, behavior:'smooth'})">← Kembali ke Dashboard</a>

          <!-- Detail export -->
          <div style="display:flex;gap:6px;margin-top:8px;margin-bottom:8px;">
            <button @click="exportSingle('csv')" style="font-family:var(--mono);font-size:10px;font-weight:700;padding:5px 10px;background:var(--surface);border:var(--bw) solid var(--border);border-radius:6px;cursor:pointer;box-shadow:1px 1px 0 var(--border);">📥 Export CSV</button>
            <button @click="exportSingle('xlsx')" style="font-family:var(--mono);font-size:10px;font-weight:700;padding:5px 10px;background:var(--surface);border:var(--bw) solid var(--border);border-radius:6px;cursor:pointer;box-shadow:1px 1px 0 var(--border);">📊 Export Excel</button>
          </div>

          <!-- Header -->
          <div class="detail-header">
            <div class="detail-commodity" x-text="detail.commodity"></div>
            <div class="detail-region" x-text="detail.region + ' · ' + detail.price_condition + ' · Horizon ' + detail.time_horizon_days + ' hari'"></div>
            <div class="detail-scores">
              <div class="detail-score-item">
                <div class="detail-score-val" :style="'color:' + riskColor(detail.risk_level)" x-text="detail.display_priority_score"></div>
                <div class="detail-score-lbl">Priority Score</div>
              </div>
              <div class="detail-score-item">
                <div class="detail-score-val" style="font-size:14px;" x-text="'Rp ' + (detail.raw_priority_score || 0).toFixed(0)"></div>
                <div class="detail-score-lbl">Raw Score</div>
              </div>
              <div class="detail-score-item">
                <div class="detail-score-val" style="font-size:14px;" x-text="(detail.confidence_factor * 100).toFixed(0) + '%'"></div>
                <div class="detail-score-lbl">Confidence Factor</div>
              </div>
              <div class="detail-score-item">
                <span class="priority-tag" :class="'tag-risk-' + detail.risk_level" x-text="detail.risk_level.toUpperCase()"></span>
                <div class="detail-score-lbl" style="margin-top:4px;">Tingkat Risiko</div>
              </div>
            </div>

            <!-- Review status -->
            <div style="margin-top:12px;display:flex;align-items:center;gap:8px;">
              <span class="review-status" :class="statusClass(detail.review?.status || 'Belum Ditinjau')"
                    x-text="detail.review?.status || 'Belum Ditinjau'"></span>
              <span style="font-family:var(--mono);font-size:9px;color:var(--muted);"
                    x-show="detail.review" x-text="'oleh user #' + detail.review.reviewer_user_id + ' · ' + (detail.review.created_at || '').substring(0,10)"></span>
            </div>
          </div>

          <!-- Evidence groups -->
          <!-- 1. Observed Facts -->
          <div class="evidence-block facts" x-show="detail.observed_facts?.length">
            <h3>Fakta Teramati</h3>
            <template x-for="f in detail.observed_facts" :key="f.label">
              <div class="evidence-item">
                <span class="evidence-tag etag-fact">FAKTA</span>
                <strong x-text="f.label"></strong>
                <span x-show="f.value" style="margin-left:4px;" x-text="': ' + f.value"></span>
              </div>
            </template>
          </div>

          <!-- 2. Model Outputs -->
          <div class="evidence-block models" x-show="detail.model_outputs?.length">
            <h3>Output Model</h3>
            <template x-for="m in detail.model_outputs" :key="m.label">
              <div class="evidence-item">
                <span class="evidence-tag etag-model">MODEL</span>
                <strong x-text="m.label"></strong>
                <span x-show="m.value" style="margin-left:4px;" x-text="': ' + m.value"></span>
              </div>
            </template>
          </div>

          <!-- 3. Possible Factors -->
          <div class="evidence-block factors" x-show="detail.possible_factors?.length">
            <h3>Faktor yang Mungkin Berkontribusi</h3>
            <template x-for="f in detail.possible_factors" :key="f.label">
              <div class="evidence-item">
                <span class="evidence-tag etag-inference">INFERENSI</span>
                <strong x-text="f.label"></strong>
                <span x-show="f.value" style="margin-left:4px;" x-text="': ' + f.value"></span>
              </div>
            </template>
          </div>

          <!-- 4. Missing Information -->
          <div class="evidence-block missing" x-show="detail.missing_information?.length">
            <h3>Informasi yang Belum Tersedia</h3>
            <template x-for="m in detail.missing_information" :key="m">
              <div class="evidence-item">
                <span class="evidence-tag etag-missing">MISSING</span>
                <span x-text="m"></span>
              </div>
            </template>
          </div>

          <!-- 5. Next Step -->
          <div class="card" x-show="detail.next_step" style="margin-bottom:14px;">
            <div class="card-label">Langkah Berikutnya</div>
            <div class="priority-next-step" style="font-size:14px;font-weight:600;" x-text="'→ ' + detail.next_step"></div>
          </div>

          <!-- 6. Response Options -->
          <div class="card" x-show="detail.response_options?.length" style="margin-bottom:14px;">
            <div class="card-label">Opsi Respons</div>
            <template x-for="ro in detail.response_options" :key="ro.label">
              <div class="response-option">
                <span class="response-icon" :style="'background:' + responseBg(ro.type) + ';color:' + responseColor(ro.type)"
                      x-text="ro.type?.substring(0,4) || '—'"></span>
                <span style="font-family:var(--sans);font-size:13px;font-weight:500;" x-text="ro.label"></span>
              </div>
            </template>
            <div style="font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:8px;">
              ⚠ Response options adalah rekomendasi tinjauan, bukan instruksi kebijakan.
            </div>
          </div>

          <!-- 7. Sources -->
          <div class="card" x-show="detail.sources?.length" style="margin-bottom:14px;">
            <div class="card-label">Sumber Data & Metodologi</div>
            <template x-for="s in detail.sources" :key="s.name">
              <div class="evidence-item" style="font-size:10px;">
                <strong x-text="s.name"></strong>
                <span x-show="s.cutoff" style="margin-left:4px;" x-text="'· cutoff: ' + s.cutoff"></span>
                <span x-show="s.version" style="margin-left:4px;" x-text="'· v' + s.version"></span>
              </div>
            </template>
          </div>

          <!-- 8. Price History Chart (if available) -->
          <div class="card" x-show="detail.price_history?.length" style="margin-bottom:14px;">
            <div class="card-label">Histori Harga 30 Hari</div>
            <canvas id="detailPriceChart" style="max-height:200px;"></canvas>
          </div>

          <!-- 9. Human Review -->
          <div class="card" style="margin-bottom:14px;">
            <div class="card-label">Human Review</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
              <button class="review-btn bahas" :class="reviewStatus === 'Untuk Dibahas' ? 'active-review' : ''"
                      @click="reviewStatus = 'Untuk Dibahas'">📋 Untuk Dibahas</button>
              <button class="review-btn tunda" :class="reviewStatus === 'Ditunda' ? 'active-review' : ''"
                      @click="reviewStatus = 'Ditunda'">⏸ Ditunda</button>
              <button class="review-btn tolak" :class="reviewStatus === 'Ditolak' ? 'active-review' : ''"
                      @click="reviewStatus = 'Ditolak'">✕ Ditolak</button>
            </div>
            <textarea class="review-note-input" x-model="reviewNote" placeholder="Alasan atau catatan reviewer (opsional)..."></textarea>
            <button class="btn btn-primary" style="margin-top:8px;" @click="submitReview()" :disabled="reviewSubmitting">
              <span x-text="reviewSubmitting ? '⟳ Menyimpan...' : 'Simpan Review'"></span>
            </button>
            <div x-show="reviewSaved" style="margin-top:8px;font-family:var(--mono);font-size:11px;color:#059669;font-weight:700;">
              ✅ Review tersimpan
            </div>
            <div x-show="reviewError" style="margin-top:8px;font-family:var(--mono);font-size:11px;color:#DC2626;font-weight:600;"
                 x-text="reviewError"></div>
          </div>

        </div>
      </template>
    </div>
  </template>

  <!-- ── Footer ── -->
  <footer class="footer">
    <a href="/docs" target="_blank">/docs</a>
    <span class="footer-sep">|</span>
    <a href="/redoc" target="_blank">/redoc</a>
    <span class="footer-sep">|</span>
    <span>R.A.D.A.R Pangan &copy; 2026</span>
  </footer>

</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     ALPINE.JS COMPONENT — Executive Dashboard
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
function executiveDashboard() {
  return {
    // ── Auth ──────────────────────────────────────────────────
    user: null,
    token: null,

    // ── Page routing ───────────────────────────────────────────
    page: 'dashboard',     // 'dashboard' | 'detail'
    detailId: null,

    // ── Dashboard state ───────────────────────────────────────
    loading: true,
    error: null,
    overview: null,
    allPriorities: [],
    filterRisk: '',
    filterProvince: '',
    prioritiesLoading: false,
    showTransparency: false,
    transparencyData: null,
    sparklines: {},
    sparklineLabels: [],

    // ── Detail state ──────────────────────────────────────────
    detail: null,
    detailLoading: false,
    detailError: null,
    reviewStatus: 'Untuk Dibahas',
    reviewNote: '',
    reviewSubmitting: false,
    reviewSaved: false,
    reviewError: null,

    // ── Init ──────────────────────────────────────────────────
    async init() {
      this.token = localStorage.getItem('rca_token');
      if (!this.token) { window.location.replace('/login'); return; }

      // ── Keyboard shortcuts ──
      document.addEventListener('keydown', (e) => {
        // '/' — focus search (unless already in an input)
        if (e.key === '/' && document.activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !== 'TEXTAREA') {
          e.preventDefault();
          const searchInput = this.$el.querySelector('.search-input');
          if (searchInput) searchInput.focus();
        }
        // 'Escape' — back to dashboard from detail view
        if (e.key === 'Escape' && this.page === 'detail') {
          e.preventDefault();
          this.page = 'dashboard';
          history.pushState({}, '', '/');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      try {
        const me = await this.fetchJSON('/api/auth/me');
        if (!me) return;
        this.user = me;
      } catch {
        this.logout();
        return;
      }

      // Cek apakah ada detail ID di URL hash
      const hash = window.location.hash;
      if (hash && hash.startsWith('#/detail/')) {
        this.detailId = hash.replace('#/detail/', '');
        this.page = 'detail';
        this.openDetail(this.detailId);
      } else {
        await this.loadOverview();
      }
    },

    // ── Routing helpers ───────────────────────────────────────
    navigateTo(url) {
      window.history.pushState({}, '', url);
    },

    // ── Dashboard loaders ─────────────────────────────────────
    async loadOverview() {
      this.loading = true;
      this.error = null;
      try {
        this.overview = await this.fetchJSON('/api/mvp/overview');
        if (this.overview) {
          await this.loadPriorities();
          // Fetch sparklines in background (non-blocking)
          this.fetchSparklines();
        }
      } catch (e) {
        this.error = 'Gagal menghubungi server. Periksa koneksi dan coba lagi.';
        console.error('Overview error:', e);
      } finally {
        this.loading = false;
      }
    },

    async fetchSparklines() {
      try {
        const data = await this.fetchJSON('/api/mvp/sparklines?n_days=14');
        if (data) {
          this.sparklineLabels = data.labels || [];
          this.sparklines = data.sparklines || {};
        }
      } catch (e) {
        // Sparklines are optional — dashboard still works without them
        console.warn('Sparklines unavailable:', e);
      }
    },

    sparklinePoints(recId) {
      const prices = this.sparklines[recId];
      if (!prices || prices.length < 2) return '';
      const valid = prices.filter(p => p != null);
      if (valid.length < 2) return '';
      const min = Math.min(...valid);
      const max = Math.max(...valid);
      if (max === min) {
        // Flat line — just draw in the middle
        const y = 12; // half of 24px height
        return valid.map((_, i) => {
          const x = (i / (valid.length - 1)) * 100;
          return (i === 0 ? `M${x},${y}` : `L${x},${y}`);
        }).join(' ');
      }
      const range = max - min;
      return valid.map((v, i) => {
        const x = (i / (valid.length - 1)) * 100;
        // Invert Y: higher price = lower position in SVG viewport
        const y = ((max - v) / range) * 20 + 2; // 2px padding top/bottom, 24px total height
        return (i === 0 ? `M${x},${y}` : `L${x},${y}`);
      }).join(' ');
    },

    async loadPriorities() {
      // Cancel any in-flight request
      if (this._prioritiesAbort) this._prioritiesAbort.abort();
      this._prioritiesAbort = new AbortController();

      this.prioritiesLoading = true;
      let url = '/api/mvp/priorities?';
      if (this.filterRisk) url += 'risk=' + encodeURIComponent(this.filterRisk) + '&';
      if (this.filterProvince) url += 'province=' + encodeURIComponent(this.filterProvince) + '&';
      try {
        this.allPriorities = await this.fetchJSON(url, {
          signal: this._prioritiesAbort.signal,
        }) || [];
      } catch (e) {
        if (e.name === 'AbortError') return; // Cancelled by newer request
        console.error('Priorities error:', e);
        this.allPriorities = [];
      } finally {
        this.prioritiesLoading = false;
      }
    },

    // ── Search ──────────────────────────────────────────────────
    searchQuery: '',
    searchResults: [],
    searchDebounce: null,
    searchLoading: false,
    searchNoResults: false,

    doSearch() {
      clearTimeout(this.searchDebounce);
      // Minimum 2 characters before searching
      if (!this.searchQuery || this.searchQuery.trim().length < 2) {
        this.searchResults = [];
        this.searchLoading = false;
        this.searchNoResults = false;
        return;
      }
      this.searchLoading = true;
      this.searchNoResults = false;
      this.searchDebounce = setTimeout(async () => {
        try {
          const data = await this.fetchJSON(
            '/api/mvp/search?q=' + encodeURIComponent(this.searchQuery.trim()),
          );
          this.searchResults = (data && data.results) ? data.results : [];
          this.searchNoResults = this.searchResults.length === 0;
        } catch (e) {
          console.error('Search error:', e);
          this.searchResults = [];
          this.searchNoResults = true;
        } finally {
          this.searchLoading = false;
        }
      }, 300);
    },

    // ── Export ──────────────────────────────────────────────────
    async exportPriorities(fmt) {
      try {
        const res = await fetch('/api/mvp/priorities/export?format=' + fmt, {
          headers: { Authorization: 'Bearer ' + this.token },
        });
        if (!res.ok) throw new Error('Export failed');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '';
        a.click();
        URL.revokeObjectURL(url);
        this.showToast('Export ' + fmt.toUpperCase() + ' berhasil diunduh', 'success');
      } catch (e) {
        this.showToast('Gagal mengekspor data. Coba lagi.', 'error');
      }
    },

    async exportSingle(fmt) {
      if (!this.detailId) return;
      try {
        const res = await fetch(
          '/api/mvp/priorities/' + encodeURIComponent(this.detailId) + '/export?format=' + fmt,
          { headers: { Authorization: 'Bearer ' + this.token } },
        );
        if (!res.ok) throw new Error('Export failed');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '';
        a.click();
        URL.revokeObjectURL(url);
        this.showToast('Export ' + fmt.toUpperCase() + ' berhasil diunduh', 'success');
      } catch {
        this.showToast('Gagal mengekspor data. Coba lagi.', 'error');
      }
    },

    // ── Transparency ───────────────────────────────────────────
    async loadTransparency() {
      if (this.transparencyData) return;
      try {
        this.transparencyData = await this.fetchJSON('/api/mvp/transparency');
      } catch (e) {
        console.error('Transparency error:', e);
      }
    },

    // ── Detail ────────────────────────────────────────────────
    async openDetail(recId) {
      this.page = 'detail';
      this.detailId = recId;
      this.detailLoading = true;
      this.detailError = null;
      this.detail = null;
      this.reviewSaved = false;
      this.reviewError = null;
      this.navigateTo('#/detail/' + recId);
      // Scroll to top so detail view is immediately visible
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        this.detail = await this.fetchJSON('/api/mvp/priorities/' + encodeURIComponent(recId));
        if (this.detail) {
          this.reviewStatus = this.detail.review?.status || 'Untuk Dibahas';
          this.reviewNote = this.detail.review?.note || '';
          // Render price chart after DOM update
          await this.$nextTick();
          this.buildDetailChart();
        }
      } catch (e) {
        this.detailError = 'Gagal memuat detail prioritas.';
        console.error('Detail error:', e);
      } finally {
        this.detailLoading = false;
      }
    },

    async submitReview() {
      if (!this.detailId || this.reviewSubmitting) return;
      this.reviewSubmitting = true;
      this.reviewSaved = false;
      this.reviewError = null;

      try {
        const result = await this.fetchJSON(
          '/api/mvp/priorities/' + encodeURIComponent(this.detailId) + '/review',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              status: this.reviewStatus,
              note: this.reviewNote || null,
            }),
          }
        );
        if (result) {
          this.reviewSaved = true;
          // Refresh detail to get updated review
          await this.openDetail(this.detailId);
          // Refresh overview to update latest reviews
          await this.loadOverview();
        }
      } catch (e) {
        this.reviewError = 'Gagal menyimpan review: ' + (e.message || 'Periksa izin akses.');
        console.error('Review error:', e);
      } finally {
        this.reviewSubmitting = false;
      }
    },

    // ── Detail chart ──────────────────────────────────────────
    buildDetailChart() {
      if (!this.detail?.price_history?.length) return;

      const canvas = document.getElementById('detailPriceChart');
      if (!canvas) return;

      // Destroy existing
      if (this._detailChart) { this._detailChart.destroy(); this._detailChart = null; }

      const history = this.detail.price_history;
      const labels = history.map(d => {
        const parts = (d.tanggal || '').split('-');
        return parts[2] + '/' + parts[1];
      });
      const prices = history.map(d => d.avg_harga);

      const trendUp = prices[prices.length - 1] > prices[0];
      const lineColor = trendUp ? '#DC2626' : '#1D7A56';
      const fillColor = trendUp ? 'rgba(220,38,38,0.06)' : 'rgba(46,204,136,0.08)';

      this._detailChart = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Harga Rata-rata',
            data: prices,
            borderColor: lineColor,
            backgroundColor: fillColor,
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 4,
            tension: 0.4,
            fill: true,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: 'index' },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a1a',
              titleFont: { family: "'JetBrains Mono', monospace", size: 10 },
              bodyFont: { family: "'JetBrains Mono', monospace", size: 10 },
              padding: 8, cornerRadius: 6,
              callbacks: {
                label: ctx => 'Rp ' + Math.round(ctx.parsed.y).toLocaleString('id-ID'),
              },
            },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { family: "'JetBrains Mono', monospace", size: 8 }, maxTicksLimit: 8 },
            },
            y: {
              grid: { color: 'rgba(0,0,0,0.04)' },
              ticks: {
                font: { family: "'JetBrains Mono', monospace", size: 9 },
                callback: v => 'Rp ' + (v / 1000).toFixed(0) + 'k',
              },
            },
          },
        },
      });
    },

    // ── Helpers ────────────────────────────────────────────────
    async fetchJSON(url, opts = {}) {
      const headers = {
        ...(this.token ? { Authorization: 'Bearer ' + this.token } : {}),
        ...(opts.headers || {}),
      };
      const res = await fetch(url, { ...opts, headers });
      if (res.status === 401) { this.logout(); return null; }
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(text || 'HTTP ' + res.status);
      }
      return res.json();
    },

    riskColor(level) {
      const map = { kritis: '#DC2626', tinggi: '#D97706', sedang: '#4338CA', rendah: '#059669' };
      return map[level] || '#71717a';
    },

    riskIcon(level) {
      // Color-blind accessible: shape + color, not just color alone
      const map = { kritis: '■', tinggi: '▲', sedang: '◆', rendah: '●' };
      return map[level] || '●';
    },

    statusClass(status) {
      if (!status) return 'belum';
      const s = status.toLowerCase();
      if (s.includes('belum')) return 'belum';
      if (s.includes('bahas')) return 'bahas';
      if (s.includes('tunda')) return 'tunda';
      if (s.includes('tolak')) return 'tolak';
      return 'belum';
    },

    responseBg(type) {
      const map = { monitor: '#D1FAE5', verifikasi: '#E0E7FF', koordinasikan: '#FEF3C7', pertimbangkan_intervensi: '#FEE2E2' };
      return map[type?.toLowerCase()] || '#F4F4F5';
    },

    responseColor(type) {
      const map = { monitor: '#059669', verifikasi: '#4338CA', koordinasikan: '#B45309', pertimbangkan_intervensi: '#DC2626' };
      return map[type?.toLowerCase()] || '#71717a';
    },

    // ── Toast notification ────────────────────────────────────
    showToast(message, type = 'success') {
      window.dispatchEvent(new CustomEvent('toast', {
        detail: { message, type },
      }));
    },

    logout() {
      localStorage.removeItem('rca_token');
      localStorage.removeItem('rca_user');
      window.location.replace('/login');
    },
  };
}
</script>

<!-- ── Toast notification ── -->
<div x-data="{ show: false, msg: '', type: 'success' }"
     @toast.window="msg = $event.detail.message; type = $event.detail.type || 'success'; show = true; setTimeout(() => show = false, 5000)"
     x-show="show"
     x-transition:enter="transition ease-out duration-200"
     x-transition:leave="transition ease-in duration-150"
     class="toast"
     :class="type === 'error' ? 'toast-error' : 'toast-success'"
     x-text="msg"
     style="display:none;">
</div>
