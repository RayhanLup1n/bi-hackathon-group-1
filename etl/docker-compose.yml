# ============================================================
# Docker Compose - BI PIHPS Data Pipeline
# Stack: Airflow (LocalExecutor) + PostgreSQL (metadata) + dbt
# Data target: Supabase PostgreSQL (cloud)
# ============================================================
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow
    # PATH: airflow binary + system binaries + dbt (installed via pip ke ~/.local/bin)
    PATH: /home/airflow/.local/bin:/usr/local/bin:/usr/bin:/bin
    # Supabase PostgreSQL credentials (passed through from .env)
    SUPABASE_HOST: ${SUPABASE_HOST:-localhost}
    SUPABASE_PORT: ${SUPABASE_PORT:-5432}
    SUPABASE_DB: ${SUPABASE_DB:-postgres}
    SUPABASE_USER: ${SUPABASE_USER:-postgres}
    SUPABASE_PASSWORD: ${SUPABASE_PASSWORD:-}
  volumes:
    # Source code (hot-reload saat development)
    - ./dags:/opt/airflow/dags
    - ./extractors:/opt/airflow/extractors
    - ./loaders:/opt/airflow/loaders
    - ./dbt_project:/opt/airflow/dbt_project
    - ./config:/opt/airflow/config
    # Airflow logs
    - airflow-logs:/opt/airflow/logs
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  # ─────────────────────────────────────────
  # PostgreSQL: Airflow metadata database
  # (NOTE: ini BUKAN data DB. Data disimpan di Supabase.)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pihps-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Airflow Init: DB migrate + admin user
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: pihps-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "==> Waiting for airflow binary..."
        which airflow || (echo "ERROR: airflow not found in PATH: $PATH" && exit 1)
        echo "==> Running db migrate..."
        airflow db migrate
        echo "==> Creating admin user..."
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname PIHPS \
          --role Admin \
          --email admin@pihps.local \
          --password admin || true
        echo "Airflow initialized."
    restart: "no"

  # ─────────────────────────────────────────
  # Airflow Webserver
  # ─────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: pihps-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # Airflow Scheduler
  # ─────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: pihps-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db:
    driver: local
  airflow-logs:
    driver: local
