<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTA & Bowtie Analysis — R.A.D.A.R Pangan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    /* ── RCA page-specific styles ── */

    /* Page hero */
    .rca-hero { margin-bottom: 28px; }
    .rca-hero-title {
      font-size: 40px; font-weight: 900; letter-spacing: -0.02em;
      line-height: 1.1; color: var(--text); margin-bottom: 8px;
    }
    .rca-hero-desc { font-size: 16px; color: var(--muted); font-weight: 500; line-height: 1.6; }

    /* ── Filter card ── */
    .rca-filter-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 20px; margin-bottom: 28px;
    }
    .rca-filter-row {
      display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap;
    }
    .rca-filter-group { display: flex; flex-direction: column; gap: 6px; min-width: 180px; flex: 1; }
    .rca-filter-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.2px; color: var(--text);
    }
    .rca-filter-select, .rca-filter-date {
      padding: 10px 14px; background: var(--surface);
      border: var(--bw) solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      box-shadow: 3px 3px 0 var(--border); outline: none; cursor: pointer;
    }
    .rca-filter-select:focus, .rca-filter-date:focus {
      outline: 3px solid var(--accent); outline-offset: 2px;
    }
    .rca-btn-run {
      padding: 12px 28px; background: var(--accent); color: #fff;
      border: var(--bw) solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--sans); font-size: 13px; font-weight: 800;
      cursor: pointer; box-shadow: var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .rca-btn-run:hover { background: var(--accent2); }
    .rca-btn-run:active { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--border); }
    .rca-btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Status cards ── */
    .rca-status-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px;
    }
    @media (max-width: 700px) { .rca-status-row { grid-template-columns: 1fr; } }
    .rca-stat-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 20px; text-align: center;
      box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s;
    }
    .rca-stat-card:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-lg); }
    .rca-stat-card.anomaly { border-left: 6px solid var(--danger); }
    .rca-stat-card.normal { border-left: 6px solid var(--success); }
    .rca-stat-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px;
    }
    .rca-stat-value { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
    .rca-stat-sub {
      font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 500;
    }

    /* ── Section header ── */
    .rca-section-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .rca-section-title {
      font-size: 24px; font-weight: 800; letter-spacing: -0.02em; color: var(--text);
    }
    .rca-section-badge {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      background: var(--accent); color: #fff;
      padding: 4px 12px; border: 2px solid var(--border); border-radius: 6px;
      text-transform: uppercase; letter-spacing: 1px;
    }

    /* ── FTA Threat grid (6 cards) ── */
    .rca-threat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px;
    }
    @media (max-width: 900px) { .rca-threat-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .rca-threat-grid { grid-template-columns: 1fr; } }

    .rca-threat-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 20px;
      box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }
    .rca-threat-card:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-lg); }
    .rca-threat-card:active { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--border); }
    .rca-threat-card.dim { opacity: 0.65; }
    .rca-threat-card-top {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px;
    }
    .rca-threat-icon { font-size: 36px; line-height: 1; }
    .rca-threat-chip {
      font-family: var(--mono); font-size: 9px; font-weight: 800;
      padding: 3px 10px; border: 2px solid var(--border); border-radius: 4px;
      text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
    }
    .rca-threat-chip.active { background: var(--accent); color: #fff; }
    .rca-threat-chip.inactive { background: var(--surface2); color: var(--muted); }
    .rca-threat-name { font-size: 16px; font-weight: 800; color: var(--text); }
    .rca-threat-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

    /* ── Detail Root Cause ── */
    .rca-detail-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 22px; margin-bottom: 20px;
    }
    .rca-detail-title {
      font-family: var(--mono); font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px;
    }
    .rca-cause-box {
      padding: 16px; background: #FEF3C7; border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); box-shadow: 2px 2px 0 var(--border); margin-bottom: 14px;
    }
    .rca-cause-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      color: #92400e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    .rca-cause-text { font-size: 14px; font-weight: 700; color: #78350f; line-height: 1.6; }
    .rca-rec-box {
      padding: 16px; background: #DBEAFE; border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); box-shadow: 2px 2px 0 var(--border);
    }
    .rca-rec-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      color: #1e40af; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    .rca-rec-text { font-size: 13px; font-weight: 600; color: #1e3a5f; line-height: 1.6; }

    /* ── Context cards ── */
    .rca-context-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;
    }
    @media (max-width: 600px) { .rca-context-row { grid-template-columns: 1fr; } }
    .rca-context-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
    }
    .rca-context-label {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px;
    }
    .rca-context-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid #e5e5e5; font-size: 13px;
    }
    .rca-context-item:last-child { border-bottom: none; }
    .rca-context-icon { font-size: 18px; flex-shrink: 0; }
    .rca-context-val { font-family: var(--mono); font-size: 12px; font-weight: 700; }
    .rca-context-label2 { font-size: 12px; color: var(--muted); }
    .rca-extreme-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 6px;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      border: 1.5px solid var(--border);
    }
    .rca-extreme-tag.yes { background: #FEE2E2; color: #DC2626; }
    .rca-extreme-tag.no { background: #D1FAE5; color: #065f46; }

    /* ── Bowtie section ── */
    .rca-bowtie-grid {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center;
      margin-bottom: 28px;
    }
    @media (max-width: 768px) {
      .rca-bowtie-grid { grid-template-columns: 1fr; }
      .rca-bowtie-col.hazard { margin: 0 auto; }
    }

    .rca-bowtie-col {
      padding: 16px; border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); box-shadow: 2px 2px 0 var(--border);
    }
    .rca-bowtie-col.prevention { background: #ECFDF5; }
    .rca-bowtie-col.hazard {
      background: #FEF3C7;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; min-width: 150px; min-height: 150px;
      border-radius: 50%; width: 150px; height: 150px;
      border-width: 4px;
    }
    .rca-bowtie-col.mitigation { background: #FEE2E2; }

    .rca-bowtie-col-title {
      font-family: var(--mono); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }
    .rca-bowtie-col.prevention .rca-bowtie-col-title { color: #059669; }
    .rca-bowtie-col.hazard .rca-bowtie-col-title { color: #92400e; }
    .rca-bowtie-col.mitigation .rca-bowtie-col-title { color: #dc2626; }

    .rca-bowtie-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 0;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      font-size: 11px; color: var(--text2);
    }
    .rca-bowtie-item:last-child { border-bottom: none; }
    .rca-bowtie-item.active { font-weight: 700; }
    .rca-bowtie-item.dim { opacity: 0.5; font-weight: 400; }
    .rca-bowtie-dot {
      width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0;
    }
    .rca-bowtie-dot.on { background: var(--accent); }
    .rca-bowtie-dot.off { background: var(--surface); }
    .rca-bowtie-dot.warn { background: var(--danger); }
    .rca-hazard-emoji { font-size: 28px; }
    .rca-hazard-text { font-family: var(--mono); font-size: 10px; font-weight: 800; color: #92400e; margin-top: 6px; line-height: 1.3; }

    /* ── Summary card ── */
    .rca-summary-card {
      display: flex; gap: 16px; align-items: flex-start;
      background: #FEF3C7; border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow);
      margin-bottom: 28px;
    }
    .rca-summary-icon {
      width: 48px; height: 48px; flex-shrink: 0;
      background: var(--text); color: #fff; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      border: var(--bw) solid var(--border); box-shadow: 2px 2px 0 var(--border);
    }
    .rca-summary-body h3 { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
    .rca-summary-body p { font-size: 13px; color: var(--text2); line-height: 1.7; }

    /* ── FTA card bowtie-style layout ── */
    .rca-fta-card {
      background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .rca-fta-ftitle {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .rca-fta-fbadge {
      font-family: var(--mono); font-size: 10px; font-weight: 700; border: 1.5px solid var(--border);
      padding: 3px 12px; border-radius: 6px;
    }

    /* ── Bowtie summary text ── */
    .rca-bowtie-summary {
      padding: 12px 16px; background: var(--surface2); border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); box-shadow: 2px 2px 0 var(--border);
      font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 16px;
    }

    /* ── Mobile nav ── */
    .hamburger-btn {
      display: none; background: var(--surface); border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; font-size: 18px;
      padding: 6px 10px; box-shadow: 2px 2px 0 var(--border); transition: transform 0.1s, box-shadow 0.1s;
    }
    .hamburger-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--border); }
    .mobile-nav { display: none; }
    .mobile-nav.show { display: flex; flex-direction: column; gap: 8px; }

    .header-right { flex-wrap: nowrap !important; }

    @media (max-width: 768px) {
      .rca-hero-title { font-size: 28px; }
      .header-right { order: 3; width: 100%; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap !important; }
    }
    @media (max-width: 640px) {
      .rca-hero-title { font-size: 26px; }
      .header { flex-direction: row; flex-wrap: wrap; }
      .header-right { display: none !important; }
      .hamburger-btn { display: flex; align-items: center; justify-content: center; margin-left: auto; }
      .mobile-nav { width: 100%; }
    }
    @media (max-width: 480px) {
      .header { padding: 10px 14px; }
      .header-title { font-size: 15px; }
    }

    .rca-empty-state { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--muted); }
    .rca-empty-icon { font-size: 48px; margin-bottom: 12px; }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="rcaPage()" x-cloak>
<div class="app">

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="header" x-data="{ navOpen: false }">
    <div class="header-left">
      <div class="logo-icon"><img src="/assets/logo.png" alt="RADAR Pangan"></div>
      <div>
        <div class="header-title">R.A.D.A.R Pangan</div>
        <div class="header-sub">fta & bowtie analysis &middot; v0.8</div>
      </div>
    </div>
    <div class="header-right" style="display:flex;align-items:center;gap:8px;font-size:12px;">
      <span class="user-badge" style="font-size:11px;">
        <strong x-text="user?.username || '—'"></strong> · <span x-text="user?.role || ''"></span>
      </span>
      <a href="/" class="nav-link nav-link-default" style="font-size:11px;padding:5px 10px;">Dashboard</a>
      <a href="/guide" class="nav-link nav-link-default" style="font-size:11px;padding:5px 10px;">Panduan</a>
      <a href="/analysis" class="nav-link nav-link-active" style="font-size:11px;padding:5px 10px;"
         x-show="user?.is_analyst || user?.is_admin || user?.role === 'analyst' || user?.role === 'admin'">FTA</a>
      <a href="/prediksi" class="nav-link nav-link-default" style="font-size:11px;padding:5px 10px;"
         x-show="user?.is_analyst || user?.is_admin || user?.role === 'analyst' || user?.role === 'admin'">Prediksi</a>
      <a href="/admin" class="nav-link nav-link-default" style="font-size:11px;padding:5px 10px;"
         x-show="user?.is_admin || user?.role === 'admin'">Admin</a>
      <button @click="logout()" class="nav-link nav-link-danger" style="font-size:11px;padding:5px 10px;">Keluar</button>
    </div>
    <button class="hamburger-btn" @click="navOpen = !navOpen" aria-label="Toggle navigation">
      <span x-text="navOpen ? '✕' : '☰'"></span>
    </button>
    <div class="mobile-nav" :class="navOpen ? 'show' : ''" style="width:100%;margin-top:10px;">
      <a href="/" class="nav-link nav-link-default" @click="navOpen = false">Dashboard</a>
      <a href="/guide" class="nav-link nav-link-default" @click="navOpen = false">Panduan</a>
      <a href="/analysis" class="nav-link nav-link-active" @click="navOpen = false"
         x-show="user?.is_analyst || user?.is_admin || user?.role === 'analyst' || user?.role === 'admin'">FTA</a>
      <a href="/prediksi" class="nav-link nav-link-default" @click="navOpen = false"
         x-show="user?.is_analyst || user?.is_admin || user?.role === 'analyst' || user?.role === 'admin'">Prediksi</a>
      <a href="/admin" class="nav-link nav-link-default" @click="navOpen = false"
         x-show="user?.is_admin || user?.role === 'admin'">Admin</a>
      <button @click="logout(); navOpen = false" class="nav-link nav-link-danger">Keluar</button>
    </div>
  </header>

  <!-- ═══════════ PAGE HERO ═══════════ -->
  <div class="rca-hero">
    <h1 class="rca-hero-title">FTA &amp; Bowtie Analysis</h1>
    <p class="rca-hero-desc">Analisis akar masalah kenaikan harga pangan menggunakan kerangka kerja Fault Tree Analysis dan Bowtie diagram.</p>
  </div>

  <!-- ═══════════ FILTER BAR ═══════════ -->
  <div class="rca-filter-card">
    <div class="rca-filter-row">
      <div class="rca-filter-group">
        <label class="rca-filter-label">Komoditas</label>
        <select class="rca-filter-select" x-model="selectedKey">
          <template x-for="c in commodities" :key="c.key">
            <option :value="c.key" x-text="c.name"></option>
          </template>
        </select>
      </div>
      <div class="rca-filter-group">
        <label class="rca-filter-label">Periode Analisis</label>
        <input type="date" class="rca-filter-date" x-model="simDate">
      </div>
      <button class="rca-btn-run" @click="runRCA()" :disabled="loading">
        <span class="material-symbols-outlined" style="font-size:18px;">analytics</span>
        <span x-text="loading ? 'Menganalisis...' : 'Jalankan FTA'"></span>
      </button>
    </div>
  </div>

  <!-- ═══════════ LOADING STATE ═══════════ -->
  <template x-if="loading && !result">
    <div class="rca-filter-card rca-empty-state">
      <span class="spinner" style="width:28px;height:28px;border-width:3px;border-color:rgba(26,26,26,0.2);border-top-color:var(--accent2);display:block;margin:0 auto 16px;"></span>
      <div>Mengambil data dan menjalankan analisis...</div>
    </div>
  </template>

  <!-- ═══════════ EMPTY STATE ═══════════ -->
  <template x-if="!result && !loading">
    <div class="rca-filter-card rca-empty-state">
      <div class="rca-empty-icon">🔍</div>
      <div style="font-weight:700;margin-bottom:6px;">Pilih komoditas dan jalankan analisis</div>
      <div>FTA engine akan memeriksa 6 faktor ancaman harga secara berurutan</div>
    </div>
  </template>

  <!-- ═══════════ RESULTS (shown after analysis) ═══════════ -->
  <template x-if="result">
    <div>

      <!-- ── Status Cards ── -->
      <div class="rca-status-row">
        <div class="rca-stat-card" :class="result.is_anomaly ? 'anomaly' : 'normal'">
          <div class="rca-stat-label">Status</div>
          <div class="rca-stat-value" :style="result.is_anomaly ? 'color:#DC2626' : 'color:#059669'"
               x-text="result.is_anomaly ? 'ANOMALI' : 'NORMAL'"></div>
          <div class="rca-stat-sub" x-text="result.root_cause || 'Tidak ada anomali terdeteksi'"></div>
        </div>
        <div class="rca-stat-card">
          <div class="rca-stat-label">Delta Harga</div>
          <div class="rca-stat-value" :style="result.delta_pct > 0 ? 'color:#DC2626' : (result.delta_pct < 0 ? 'color:#059669' : '')"
               x-text="(result.delta_pct > 0 ? '+' : '') + result.delta_pct.toFixed(1) + '%'"></div>
          <div class="rca-stat-sub" x-text="'Rp ' + (result.price_now||0).toLocaleString('id-ID') + '/kg'"></div>
        </div>
        <div class="rca-stat-card">
          <div class="rca-stat-label">Persebaran Kota</div>
          <div class="rca-stat-value" x-text="result.kota_naik + '/' + result.total_kota"></div>
          <div class="rca-stat-sub" x-text="'kota naik (' + ((result.total_kota ? result.kota_naik/result.total_kota*100 : 0).toFixed(0)) + '%)'"></div>
        </div>
      </div>

      <!-- ── Detail Root Cause ── -->
      <template x-if="result.root_cause">
        <div class="rca-detail-card">
          <div class="rca-detail-title">Detail Root Cause</div>
          <div class="rca-cause-box">
            <div class="rca-cause-label">Penyebab</div>
            <div class="rca-cause-text">
              <strong x-text="result.root_cause"></strong>
              <template x-if="result.description">
                <div style="margin-top:6px;font-size:12px;color:#555;" x-text="result.description"></div>
              </template>
            </div>
          </div>
          <div class="rca-rec-box">
            <div class="rca-rec-label">Rekomendasi Kebijakan</div>
            <div class="rca-rec-text" x-text="result.recommendation || 'Lakukan monitoring intensif dan koordinasi dengan TPID setempat.'"></div>
          </div>
          <template x-if="result.severity_level">
            <div style="margin-top:12px;font-family:var(--mono);font-size:10px;color:var(--muted);">
              Severity: <strong x-text="result.severity_level"></strong>
              <template x-if="result.yes_indicators.length">
                <span> — <span x-text="result.yes_indicators.join(', ')"></span></span>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- ── Context: Cuaca + Hari Besar ── -->
      <div class="rca-context-row">
        <div class="rca-context-card">
          <div class="rca-context-label">Info Cuaca (Open-Meteo)</div>
          <template x-if="cuacaData">
            <div>
              <div style="margin-bottom:10px;">
                <span class="rca-extreme-tag" :class="cuacaData.ekstrem ? 'yes' : 'no'"
                      x-text="cuacaData.ekstrem ? '⚠ Cuaca Ekstrem' : '✓ Normal'"></span>
              </div>
              <div class="rca-context-item">
                <span class="rca-context-icon">🌧</span>
                <span class="rca-context-val" x-text="cuacaData.detail?.precipitation_sum?.toFixed(1) || '—'"></span>
                <span class="rca-context-label2">mm curah hujan</span>
              </div>
              <div class="rca-context-item">
                <span class="rca-context-icon">🌡</span>
                <span class="rca-context-val" x-text="cuacaData.detail?.temperature_max?.toFixed(1) || '—'"></span>
                <span class="rca-context-label2">°C suhu maks</span>
              </div>
              <div class="rca-context-item">
                <span class="rca-context-icon">💨</span>
                <span class="rca-context-val" x-text="cuacaData.detail?.wind_speed_max?.toFixed(1) || '—'"></span>
                <span class="rca-context-label2">km/h angin maks</span>
              </div>
              <div class="rca-context-item" x-show="cuacaData.daerah">
                <span class="rca-context-icon">📍</span>
                <span class="rca-context-val" x-text="cuacaData.daerah || ''"></span>
              </div>
            </div>
          </template>
          <template x-if="!cuacaData">
            <div class="rca-empty-state" style="padding:20px;font-size:12px;">Pilih komoditas dan jalankan Analisis</div>
          </template>
        </div>

        <div class="rca-context-card">
          <div class="rca-context-label">Hari Besar Terdekat</div>
          <template x-if="result.checks && result.checks.length > 0">
            <div>
              <template x-for="check in result.checks.filter(c => c.name.includes('Hari Raya'))" :key="check.name">
                <div>
                  <template x-if="check.result === 'TRIGGERED'">
                    <div class="rca-context-item" style="background:#FEF3C7;padding:10px;border-radius:8px;border:none;">
                      <span style="font-size:20px;">🕌</span>
                      <div>
                        <div style="font-weight:700;" x-text="check.detail"></div>
                        <div style="font-family:var(--mono);font-size:10px;color:#92400e;font-weight:600;">Demand window aktif</div>
                      </div>
                    </div>
                  </template>
                  <template x-if="check.result !== 'TRIGGERED'">
                    <div class="rca-context-item">
                      <span style="font-size:18px;">📅</span>
                      <div>
                        <div style="font-size:12px;font-weight:600;" x-text="check.detail || 'Tidak dalam periode hari raya'"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!result.checks">
            <div class="rca-empty-state" style="padding:20px;font-size:12px;">Jalankan Analisis untuk melihat info hari besar</div>
          </template>
        </div>
      </div>

      <!-- ═══════════ FTA THREATS SECTION ═══════════ -->
      <div class="rca-section-head">
        <h2 class="rca-section-title">Identifikasi Ancaman (FTA)</h2>
        <span class="rca-section-badge" x-show="bowtieData"
              x-text="bowtieData.active_threats?.filter(t => t.active).length + ' Aktif'"></span>
      </div>

      <!-- FTA Threat Grid (from Bowtie or RCA checks) -->
      <div class="rca-threat-grid" x-show="bowtieData">
        <template x-for="t in bowtieData.active_threats" :key="t.id">
          <div class="rca-threat-card" :class="t.active ? '' : 'dim'"
               :style="t.active ? 'border-left:6px solid var(--accent);' : 'border-left:6px solid var(--muted);'">
            <div class="rca-threat-card-top">
              <span class="rca-threat-icon" x-text="t.icon || '⚠️'"></span>
              <span class="rca-threat-chip" :class="t.active ? 'active' : 'inactive'"
                    x-text="t.active ? 'ACTIVE' : 'NORMAL'"></span>
            </div>
            <div class="rca-threat-name" x-text="t.id + ': ' + t.name"></div>
            <div class="rca-threat-desc" x-text="t.desc"></div>
          </div>
        </template>
      </div>

      <!-- ═══════════ BOWTIE ANALYSIS ═══════════ -->
      <template x-if="bowtieData">
        <div>
          <!-- Bowtie Section Header -->
          <div class="rca-section-head">
            <h2 class="rca-section-title">Visualisasi Kontrol &amp; Mitigasi (Bowtie)</h2>
          </div>

          <div class="rca-fta-card">
            <!-- Summary -->
            <div class="rca-bowtie-summary" x-text="bowtieData.summary"></div>

            <!-- Bowtie 3-column -->
            <div class="rca-bowtie-grid">
              <!-- Prevention -->
              <div class="rca-bowtie-col prevention">
                <div class="rca-bowtie-col-title">
                  Pencegahan (<span x-text="bowtieData.prevention.filter(b => b.active).length"></span> aktif)
                </div>
                <template x-for="b in bowtieData.prevention" :key="b.id">
                  <div class="rca-bowtie-item" :class="b.active ? 'active' : 'dim'">
                    <span class="rca-bowtie-dot" :class="b.active ? 'on' : 'off'"></span>
                    <span x-text="b.id + ': ' + b.name"></span>
                  </div>
                </template>
              </div>

              <!-- Hazard Event -->
              <div class="rca-bowtie-col hazard">
                <div class="rca-bowtie-col-title">Hazard</div>
                <div class="rca-hazard-emoji">⚠️</div>
                <div class="rca-hazard-text" x-text="bowtieData.hazard_event"></div>
              </div>

              <!-- Mitigation -->
              <div class="rca-bowtie-col mitigation">
                <div class="rca-bowtie-col-title">
                  Mitigasi (<span x-text="bowtieData.mitigation.filter(b => b.active).length"></span> aktif)
                </div>
                <template x-for="b in bowtieData.mitigation" :key="b.id">
                  <div class="rca-bowtie-item" :class="b.active ? 'active' : 'dim'">
                    <span class="rca-bowtie-dot" :class="b.active ? 'warn' : 'off'"></span>
                    <span x-text="b.id + ': ' + b.name"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- ── Fallback FTA cards from RCA checks (when no bowtie data) ── -->
      <template x-if="!bowtieData && result.checks && result.checks.length > 0">
        <div>
          <div class="rca-fta-card">
            <div class="rca-fta-ftitle">
              <div class="rca-detail-title" style="margin-bottom:0;">FTA Threats</div>
              <span class="rca-fta-fbadge" style="background:#E0F5EA;color:var(--accent2);"
                    x-text="result.checks.filter(c => c.result === 'TRIGGERED').length + ' aktif · ' + result.severity_level"></span>
            </div>
            <div class="rca-threat-grid" style="margin-bottom:0;">
              <template x-for="c in result.checks" :key="c.name">
                <div class="rca-threat-card" :class="c.result === 'TRIGGERED' ? '' : 'dim'"
                     :style="c.result === 'TRIGGERED' ? 'border-left:6px solid var(--accent);' : 'border-left:6px solid var(--muted);'">
                  <div class="rca-threat-card-top">
                    <span class="rca-threat-icon" x-text="c.result === 'TRIGGERED' ? '⚠️' : '✅'"></span>
                    <span class="rca-threat-chip" :class="c.result === 'TRIGGERED' ? 'active' : 'inactive'"
                          x-text="c.result"></span>
                  </div>
                  <div class="rca-threat-name" x-text="c.name"></div>
                  <div class="rca-threat-desc" x-text="c.detail || ''"></div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- ── Summary card ── -->
      <template x-if="result.root_cause">
        <div class="rca-summary-card">
          <div class="rca-summary-icon">
            <span class="material-symbols-outlined" style="font-size:28px;">summarize</span>
          </div>
          <div class="rca-summary-body">
            <h3>Ringkasan Temuan RCA</h3>
            <p>
              Analisis menunjukkan bahwa hasil FTA engine mengidentifikasi
              <strong x-text="result.root_cause"></strong>.
              <template x-if="result.checks">
                <span>
                  <span x-text="result.checks.filter(c => c.result === 'TRIGGERED').length"></span> dari
                  <span x-text="result.checks.length"></span> indikator terpicu
                  (severity: <strong x-text="result.severity_level"></strong>).
                </span>
              </template>
              Rekomendasi: <span x-text="result.recommendation || 'Koordinasi dengan TPID setempat.'"></span>
            </p>
          </div>
        </div>
      </template>

    </div>
  </template>

</div>
<!-- /app -->

<script>
function rcaPage() {
  return {
    // Auth
    token: localStorage.getItem('rca_token'),
    user: JSON.parse(localStorage.getItem('rca_user') || 'null'),

    // Data
    commodities: [],
    provinces: [
      { id: 11, name: 'Banten' },
      { id: 12, name: 'Jawa Barat' },
      { id: 13, name: 'DKI Jakarta' },
      { id: 26, name: 'Sulawesi Selatan' },
    ],

    // Filters
    selectedKey: '',
    selectedProvinsi: '',
    simDate: '',

    // State
    loading: false,
    result: null,
    cuacaData: null,
    bowtieData: null,

    async init() {
      if (!this.token) { window.location.replace('/login'); return; }
      try {
        const r = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + this.token } });
        if (!r.ok) throw new Error();
        const me = await r.json();
        this.user = me;
        if (!me.is_admin && !me.is_analyst) {
          window.location.replace('/');
          return;
        }
      } catch {
        window.location.replace('/login');
        return;
      }

      try {
        const r = await fetch('/api/commodities/detail', this._authOpts());
        if (r.ok) {
          this.commodities = await r.json();
          if (this.commodities.length) this.selectedKey = this.commodities[0].key;
        }
      } catch {}
    },

    _authOpts() {
      return { headers: this.token ? { Authorization: 'Bearer ' + this.token } : {} };
    },

    async runRCA() {
      if (!this.selectedKey || this.loading) return;
      this.loading = true;
      this.result = null;
      this.cuacaData = null;
      this.bowtieData = null;

      const dateParam = this.simDate ? `?sim_date=${this.simDate}` : '';

      try {
        const [rcaRes, comRes] = await Promise.all([
          fetch(`/api/analysis/${this.selectedKey}${dateParam}`, this._authOpts()),
          fetch(`/api/commodity/${this.selectedKey}${dateParam}`, this._authOpts()),
        ]);

        if (!rcaRes.ok) throw new Error('Analysis request failed');
        const rcaData = await rcaRes.json();

        let comData = null;
        if (comRes.ok) comData = await comRes.json();

        const kotaList = comData?.kota_list || [];
        const kotaNaik = kotaList.filter(k => k.naik).length;

        this.result = {
          is_anomaly: rcaData.is_anomaly,
          root_cause: rcaData.title || '',
          description: rcaData.description || '',
          recommendation: rcaData.action || '',
          delta_pct: rcaData.price_delta_pct || 0,
          price_now: comData?.price_now || 0,
          kota_naik: kotaNaik,
          total_kota: kotaList.length,
          severity_level: rcaData.severity_level || 'L0',
          yes_indicators: rcaData.yes_indicators || [],
          checks: (rcaData.checks || []).map(c => ({
            ...c,
            name: c.nama || c.name || '',
            result: (c.status || '').toUpperCase(),
          })),
        };

        const provId = this.selectedProvinsi || 12;
        try {
          const wRes = await fetch(`/api/cuaca/${provId}${dateParam}`, this._authOpts());
          if (wRes.ok) {
            const wData = await wRes.json();
            const latestDay = (wData.harian && wData.harian.length > 0) ? wData.harian[0] : {};
            this.cuacaData = {
              ekstrem: comData?.cuaca?.ekstrem ?? wData.ekstrem ?? false,
              desc: comData?.cuaca?.desc || wData.ringkasan || '',
              daerah: comData?.cuaca?.daerah || wData.daerah || latestDay.lokasi_label || '',
              detail: {
                precipitation_sum: latestDay.precipitation_sum ?? null,
                temperature_max: latestDay.temperature_max ?? null,
                wind_speed_max: latestDay.wind_speed_max ?? null,
              },
            };
          } else if (comData?.cuaca) {
            this.cuacaData = comData.cuaca;
          }
        } catch {
          if (comData?.cuaca) this.cuacaData = comData.cuaca;
        }

        try {
          const bRes = await fetch(`/api/bowtie/${this.selectedKey}${dateParam}`, this._authOpts());
          if (bRes.ok) this.bowtieData = await bRes.json();
        } catch {
          this.bowtieData = null;
        }

      } catch (err) {
        console.error('Analysis Error:', err);
      } finally {
        this.loading = false;
      }
    },

    logout() {
      localStorage.removeItem('rca_token');
      localStorage.removeItem('rca_user');
      window.location.replace('/login');
    },
  };
}
</script>
</body>
</html>
