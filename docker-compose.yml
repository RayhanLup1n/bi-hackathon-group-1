# ============================================================
# Docker Compose - R.A.D.A.R Pangan
#
# Services:
#   app          - FastAPI backend + frontend (always runs)
#   ml-model     - ML inference server (profile: ml)
#   airflow-*    - ETL pipeline (profile: etl)
#
# Usage:
#   docker compose up app                    # App only
#   docker compose --profile ml up           # App + ML model
#   docker compose --profile etl up          # App + Airflow ETL
#   docker compose --profile ml --profile etl up  # Everything
# ============================================================

services:
  # ─────────────────────────────────────────
  # FastAPI App (Backend + Frontend)
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-pangan-app
    ports:
      - "8000:8000"
    env_file:
      - .envs/.env
    environment:
      - PYTHONUNBUFFERED=1
      # BigQuery config (override via .env if needed)
      - GCP_PROJECT=${GCP_PROJECT:-radar-pangan-hackathon}
      - BQ_LOCATION=${BQ_LOCATION:-asia-southeast2}
    volumes:
      # Credentials (read-only)
      - ./.envs:/app/.envs:ro
      # GCP Application Default Credentials for BigQuery access
      # Windows: %APPDATA%/gcloud/application_default_credentials.json
      # Linux/macOS: ~/.config/gcloud/application_default_credentials.json
      - ${GOOGLE_APPLICATION_CREDENTIALS_DIR:-~/.config/gcloud}:/root/.config/gcloud:ro
      # Frontend hot-reload during development (remove in production)
      - ./frontend:/app/frontend:ro
    networks:
      - radar-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # ML Inference Server (teammate managed)
  #
  # Activate with: docker compose --profile ml up
  #
  # Contract:
  #   - Expose port 8001
  #   - POST /predict -> predictions
  #   - GET  /health  -> {"status": "ok"}
  #   - FastAPI proxies via /api/ml/*
  # ─────────────────────────────────────────
  ml-model:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: radar-pangan-ml
    ports:
      - "8001:8001"
    env_file:
      - .envs/.env
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PORT=8001
    volumes:
      - ./ml/models:/app/models:ro
    networks:
      - radar-network
    restart: unless-stopped
    profiles:
      - ml
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  # Airflow PostgreSQL (metadata only)
  # ─────────────────────────────────────────
  airflow-postgres:
    image: postgres:16-alpine
    container_name: radar-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - radar-network
    restart: unless-stopped
    profiles:
      - etl

  # ─────────────────────────────────────────
  # Airflow Init
  # ─────────────────────────────────────────
  airflow-init:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: radar-airflow-init
    env_file:
      - etl/.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      PYTHONPATH: /opt/airflow
      PATH: /home/airflow/.local/bin:/usr/local/bin:/usr/bin:/bin
      SUPABASE_HOST: ${SUPABASE_HOST:-localhost}
      SUPABASE_PORT: ${SUPABASE_PORT:-5432}
      SUPABASE_DB: ${SUPABASE_DB:-postgres}
      SUPABASE_USER: ${SUPABASE_USER:-postgres}
      SUPABASE_PASSWORD: ${SUPABASE_PASSWORD:-}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username admin --firstname Admin --lastname PIHPS \
          --role Admin --email admin@pihps.local --password admin || true
        echo "Airflow initialized."
    depends_on:
      airflow-postgres:
        condition: service_healthy
    networks:
      - radar-network
    restart: "no"
    profiles:
      - etl

  # ─────────────────────────────────────────
  # Airflow Webserver
  # ─────────────────────────────────────────
  airflow-webserver:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: radar-airflow-webserver
    env_file:
      - etl/.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      PYTHONPATH: /opt/airflow
      PATH: /home/airflow/.local/bin:/usr/local/bin:/usr/bin:/bin
      SUPABASE_HOST: ${SUPABASE_HOST:-localhost}
      SUPABASE_PORT: ${SUPABASE_PORT:-5432}
      SUPABASE_DB: ${SUPABASE_DB:-postgres}
      SUPABASE_USER: ${SUPABASE_USER:-postgres}
      SUPABASE_PASSWORD: ${SUPABASE_PASSWORD:-}
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./etl/dags:/opt/airflow/dags
      - ./etl/extractors:/opt/airflow/extractors
      - ./etl/loaders:/opt/airflow/loaders
      - ./etl/dbt_project:/opt/airflow/dbt_project
      - ./etl/config:/opt/airflow/config
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - radar-network
    restart: unless-stopped
    profiles:
      - etl

  # ─────────────────────────────────────────
  # Airflow Scheduler
  # ─────────────────────────────────────────
  airflow-scheduler:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: radar-airflow-scheduler
    env_file:
      - etl/.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      PYTHONPATH: /opt/airflow
      PATH: /home/airflow/.local/bin:/usr/local/bin:/usr/bin:/bin
      SUPABASE_HOST: ${SUPABASE_HOST:-localhost}
      SUPABASE_PORT: ${SUPABASE_PORT:-5432}
      SUPABASE_DB: ${SUPABASE_DB:-postgres}
      SUPABASE_USER: ${SUPABASE_USER:-postgres}
      SUPABASE_PASSWORD: ${SUPABASE_PASSWORD:-}
    command: scheduler
    volumes:
      - ./etl/dags:/opt/airflow/dags
      - ./etl/extractors:/opt/airflow/extractors
      - ./etl/loaders:/opt/airflow/loaders
      - ./etl/dbt_project:/opt/airflow/dbt_project
      - ./etl/config:/opt/airflow/config
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - radar-network
    restart: unless-stopped
    profiles:
      - etl

networks:
  radar-network:
    driver: bridge

volumes:
  airflow-postgres-db:
    driver: local
  airflow-logs:
    driver: local
