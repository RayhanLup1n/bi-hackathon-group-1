# =============================================================================
# Flow 2: Daily ETL Pipeline - R.A.D.A.R Pangan
#
# Purpose: Daily incremental update - re-extracts current year data and
#          refreshes dashboard. Runs automatically via scheduler.
#
# Note: Scripts only support --start-year/--end-year (integer), not single
#       date extraction. Daily pipeline re-runs current year extraction.
#       Scripts use WRITE_APPEND, dbt staging handles deduplication.
#
# Steps:
#   1. Check PIHPS API availability (fail-fast)
#   2. Extract current year harga -> BigQuery (append, dbt dedup)
#   3. Extract current year cuaca -> BigQuery (append, dbt dedup)
#   4. Fetch BMKG 3-day forecast -> Supabase app.bmkg_siaga
#   5. dbt run staging + marts (BigQuery transforms)
#   6. dbt test (data quality checks)
#   7. Sync gold layer: BigQuery marts -> Supabase PostgreSQL
#   8. Log daily summary
#
# Schedule: 00:00 UTC (07:00 WIB) every day
# =============================================================================

id: radar_pangan_daily
namespace: radar.pangan

description: |
  Daily incremental ETL pipeline for R.A.D.A.R Pangan.
  Re-extracts current year data from PIHPS and weather (scripts handle append,
  dbt staging handles deduplication), then syncs gold layer to Supabase.

labels:
  team: simatana
  env: dev
  type: daily-pipeline

tasks:
  # --------------------------------------------------------------------------
  # Step 1: Check PIHPS source availability
  # --------------------------------------------------------------------------
  - id: check_source
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - cd /app/project && python etl/scripts/check_pihps_health.py
    description: "Fail-fast check: is PIHPS API reachable?"

  # --------------------------------------------------------------------------
  # Step 2: Extract current year harga -> BigQuery
  # --------------------------------------------------------------------------
  - id: extract_harga
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - cd /app/project && python -X utf8 etl/scripts/load_historical.py --start-year {{ now() | date('yyyy') }} --end-year {{ now() | date('yyyy') }}
    description: "Extract current year PIHPS prices to BigQuery (4 provinces, 6 commodities)"
    retry:
      type: constant
      maxAttempt: 3
      interval: PT10M

  # --------------------------------------------------------------------------
  # Step 3: Extract current year cuaca -> BigQuery
  # --------------------------------------------------------------------------
  - id: extract_cuaca
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - cd /app/project && python etl/scripts/load_weather_historical.py --start-year {{ now() | date('yyyy') }} --end-year {{ now() | date('yyyy') }}
    description: "Extract current year weather data from Open-Meteo to BigQuery (5 locations)"

  # --------------------------------------------------------------------------
  # Step 4: Fetch BMKG 3-day forecast -> Supabase
  # --------------------------------------------------------------------------
  - id: fetch_bmkg_forecast
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - cd /app/project && python etl/scripts/fetch_bmkg_forecast.py
    description: "Fetch 3-day weather forecast from BMKG API -> Supabase app.bmkg_siaga"
    allowFailure: true

  # --------------------------------------------------------------------------
  # Step 5: dbt run - staging + marts (full refresh)
  # --------------------------------------------------------------------------
  - id: dbt_run
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - dbt run --project-dir /app/project/etl/dbt_project --profiles-dir /app/project/etl/dbt_project --target-path /tmp/dbt-target --log-path /tmp/dbt-logs
    description: "Run all dbt models (staging views + marts tables)"

  # --------------------------------------------------------------------------
  # Step 6: dbt test - data quality checks
  # --------------------------------------------------------------------------
  - id: dbt_test
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - dbt test --project-dir /app/project/etl/dbt_project --profiles-dir /app/project/etl/dbt_project --target-path /tmp/dbt-target --log-path /tmp/dbt-logs
    description: "Run dbt tests (NOT NULL, UNIQUE, data quality)"
    allowFailure: true

  # --------------------------------------------------------------------------
  # Step 7: Sync gold layer - BigQuery marts to Supabase PostgreSQL
  # --------------------------------------------------------------------------
  - id: sync_gold_to_postgres
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - cd /app/project && python etl/scripts/sync_gold_to_postgres.py
    description: "Sync updated marts to Supabase PostgreSQL (Gold serving layer)"

  # --------------------------------------------------------------------------
  # Step 8: Log daily summary
  # --------------------------------------------------------------------------
  - id: log_summary
    type: io.kestra.plugin.core.log.Log
    message: |
      ============================================================
      DAILY PIPELINE COMPLETE: radar_pangan_daily
      ============================================================
      Execution   : {{ execution.id }}
      Status      : {{ execution.status }}
      ============================================================

# -- Schedule: 00:00 UTC (07:00 WIB) every day --------------------------------
triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 0 * * *"
    description: "Daily at 00:00 UTC (07:00 WIB)"
