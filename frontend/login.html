<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — R.A.D.A.R Pangan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/config.js"></script>
  <style>
    /* -- Design tokens (inline fallback, mirrors style.css) -- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #EEF7F1; --bg2: #F0FBF4; --surface: #FFFFFF; --surface2: #F0FBF4;
      --border: #1a1a1a; --accent: #2ECC88; --accent2: #1D7A56;
      --warn: #FBBF24; --danger: #F87171;
      --text: #1a1a1a; --text2: #3f3f46; --muted: #71717a;
      --radar-yellow: #FEF3C7;
      --mono: 'JetBrains Mono', monospace; --sans: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      --radius: 16px; --radius-sm: 12px;
      --shadow: 4px 4px 0px #1a1a1a; --shadow-lg: 6px 6px 0px #1a1a1a;
      --bw: 2.5px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); min-height: 100vh; overflow-x: hidden;
    }

    /* -- Split layout: branding (left) + form (right) -- */
    .split {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    @media (min-width: 768px) {
      .split { flex-direction: row; }
    }

    /* ── LEFT: Branding & Hero ───────────────────────────────── */
    .brand-side {
      width: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      position: relative;
      overflow: hidden;
      text-align: center;
      min-height: 40vh;
    }
    @media (min-width: 768px) {
      .brand-side { width: 50%; min-height: 100vh; padding: 64px; }
    }
    /* Radar concentric-circle pattern overlay (matches mockup radar-circles) */
    .brand-side::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at center, transparent 0%, transparent 40%,
          rgba(29, 122, 86, 0.05) 41%, rgba(29, 122, 86, 0.05) 42%, transparent 43%);
      background-size: 150px 150px;
      background-position: center;
      opacity: 0.5;
      pointer-events: none;
    }
    /* Ambient soft blobs for depth */
    .brand-side::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(46,204,136,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(29,122,86,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .brand-inner {
      position: relative;
      z-index: 1;
    }
    .brand-logo {
      width: 128px;
      height: 128px;
      border: var(--bw) solid var(--border);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-lg);
      margin: 0 auto 24px;
      overflow: hidden;
      padding: 0;
      background: var(--surface);
    }
    @media (min-width: 768px) {
      .brand-logo { width: 192px; height: 192px; border-radius: 20px; }
    }
    .brand-logo img {
      width: 100%; height: 100%; object-fit: cover;
    }
    /* Fallback initial badge if logo asset missing */
    .brand-logo .logo-fallback {
      font-family: var(--mono);
      font-size: 48px;
      font-weight: 800;
      color: var(--accent2);
    }
    .brand-title {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .brand-tagline {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── RIGHT: Login Form ──────────────────────────────────── */
    .form-side {
      width: 100%;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    @media (min-width: 768px) {
      .form-side { width: 50%; padding: 40px 64px; }
    }
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .spinner {
      width: 15px; height: 15px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-card {
      background: var(--surface);
      border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm);
      padding: 40px;
      box-shadow: var(--shadow);
      animation: slide-up 0.35s ease both;
    }

    .login-heading {
      margin-bottom: 32px;
    }
    .login-title {
      font-size: 1.875rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .login-subtitle {
      color: #6b7280;
      font-weight: 500;
      font-size: 15px;
    }

    .form-group { margin-bottom: 24px; }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .form-label {
      display: block;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .form-input-wrap { position: relative; }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .form-input::placeholder { color: #9ca3af; font-weight: 400; }
    .form-input:focus {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
    .form-input.error {
      border-color: var(--danger);
      background: #FEE2E2;
    }
    .form-input-pw { padding-right: 46px; }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #6b7280;
      padding: 4px 6px;
      transition: color 0.2s;
      line-height: 1;
      border-radius: 6px;
    }
    .pw-toggle:hover { color: var(--accent2); }

    /* Remember-me row */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .remember-row input[type="checkbox"] {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 4px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .remember-row label {
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .error-alert {
      display: none;
      background: #FEE2E2;
      border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: #DC2626;
      margin-bottom: 16px;
      align-items: center;
      gap: 8px;
      box-shadow: 2px 2px 0 var(--border);
    }
    .error-alert.show { display: flex; animation: slide-up 0.2s ease; }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #ffffff;
      border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .login-btn:hover:not(:disabled) {
      box-shadow: var(--shadow-lg);
      transform: translate(-2px, -2px);
      background: var(--accent2);
    }
    .login-btn:active:not(:disabled) {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--border);
    }
    .login-btn:disabled {
      opacity: 0.6; cursor: not-allowed; box-shadow: none;
      transform: translate(2px, 2px);
    }

    /* Divider between form and demo hint */
    .divider {
      position: relative;
      margin: 32px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .divider::before {
      content: '';
      position: absolute;
      inset: 0;
      border-bottom: 2.5px solid rgba(26,26,26,0.1);
    }
    .divider span {
      position: relative;
      background: var(--surface);
      padding: 0 16px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 800;
      color: #9ca3af;
      letter-spacing: 0.05em;
    }

    /* Demo credentials box (radar-yellow like mockup) */
    .demo-hint {
      background: var(--radar-yellow);
      border: var(--bw) solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.6;
      color: var(--text2);
    }
    .demo-hint .demo-icon { color: var(--text); flex-shrink: 0; font-size: 18px; }
    .demo-hint .demo-label { font-weight: 800; color: var(--text); display: block; margin-bottom: 4px; }
    .demo-hint code { display: block; color: #4b5563; font-family: var(--mono); }
    .demo-hint .role-badge {
      display: inline-block;
      background: #E0F5EA;
      color: var(--accent2);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 4px;
    }

    .footer-note {
      margin-top: 32px;
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: #9ca3af;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Reduced motion: respect user preference */
    @media (prefers-reduced-motion: reduce) {
      .login-card { animation: none; }
      .spinner { animation-duration: 1.2s; }
    }
  </style>
</head>
<body>

<div class="split">
  <!-- ── LEFT: Branding & Hero ── -->
  <section class="brand-side">
    <div class="brand-inner">
      <div class="brand-logo">
        <img src="/assets/logo.png" alt="RADAR Pangan" onerror="this.style.display='none';this.parentElement.querySelector('.logo-fallback').style.display='flex'">
        <span class="logo-fallback" style="display:none;">R</span>
      </div>
      <h1 class="brand-title">R.A.D.A.R Pangan</h1>
      <p class="brand-tagline">PREDICT | PREVENT | PROTECT</p>
    </div>
  </section>

  <!-- ── RIGHT: Login Form ── -->
  <section class="form-side">
    <div class="login-wrap">
      <div class="login-card">

        <div class="login-heading">
          <h2 class="login-title">Masuk ke Dashboard</h2>
          <p class="login-subtitle">Silakan masuk dengan akun anda</p>
        </div>

        <div class="error-alert" id="errorAlert">
          <span>⚠</span>
          <span id="errorText">Username atau password salah</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="on">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input
              type="text"
              id="username"
              class="form-input"
              placeholder="nama.anggota"
              autocomplete="username"
              required
              autofocus
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="form-input-wrap">
              <input
                type="password"
                id="password"
                class="form-input form-input-pw"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              >
              <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePw()" title="Tampilkan password">👁</button>
            </div>
          </div>

          <div class="remember-row">
            <input type="checkbox" id="remember">
            <label for="remember">Ingat username saya</label>
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            <span id="loginBtnContent">Masuk</span>
          </button>
        </form>

        <!-- Divider -->
        <!--div class="divider"><span>ATAU</span></div-->

        <!-- Demo hint: only visible if ?demo=1 query param is present -->
        <div class="demo-hint" id="demoHint" style="display:none;">
          <span class="demo-icon">ℹ</span>
          <div>
            <span class="demo-label">DEMO MODE:</span>
            <code>admin / admin123 <span class="role-badge">admin</span></code>
            <code>analyst / analyst123 <span class="role-badge">analyst</span></code>
          </div>
        </div>

        <div class="footer-note">Tim Simatana — Hackathon PIDI 2026</div>

      </div>
    </div>
  </section>
</div>

<script>
  // Show demo hint only if ?demo=1 is in URL (for demo presentation only)
  (function showDemoHint() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('demo') === '1') {
      const hint = document.getElementById('demoHint');
      if (hint) hint.style.display = 'flex';
    }
  })();

  // Redirect jika sudah login
  (function checkExisting() {
    const token = localStorage.getItem('rca_token');
    if (!token) return;
    fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })
      .then(r => r.ok ? r.json() : null)
      .then(me => { if (me) window.location.replace('/'); })
      .catch(() => {});
  })();

  function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('pwToggle');
    const isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁';
    btn.title = isHidden ? 'Sembunyikan password' : 'Tampilkan password';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const content  = document.getElementById('loginBtnContent');
    const alert    = document.getElementById('errorAlert');
    const errText  = document.getElementById('errorText');

    alert.classList.remove('show');
    document.getElementById('username').classList.remove('error');
    document.getElementById('password').classList.remove('error');
    btn.disabled = true;
    content.innerHTML = '<span style="display:inline-flex;align-items:center;justify-content:center;gap:8px;"><span class="spinner"></span> MEMPROSES...</span>';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || 'Login gagal');
      }

      localStorage.setItem('rca_token', data.access_token);
      localStorage.setItem('rca_user', JSON.stringify(data.user));

      // Remember-me: save flag so username is pre-filled on next visit
      if (document.getElementById('remember').checked) {
        localStorage.setItem('rca_remember', '1');
      } else {
        localStorage.removeItem('rca_remember');
      }

      window.location.replace('/');
    } catch (err) {
      errText.textContent = err.message;
      alert.classList.add('show');
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
      btn.disabled = false;
      content.innerHTML = 'Masuk';
    }
  }

  // Hapus error state saat user mulai mengetik
  ['username', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('errorAlert').classList.remove('show');
      document.getElementById(id).classList.remove('error');
    });
  });

  // Pre-fill remembered username if user opted "remember me" previously
  (function prefillRemembered() {
    if (localStorage.getItem('rca_remember') === '1') {
      const user = localStorage.getItem('rca_user');
      if (user) {
        try {
          const parsed = JSON.parse(user);
          const u = document.getElementById('username');
          if (parsed && parsed.username && !u.value) u.value = parsed.username;
          document.getElementById('remember').checked = true;
        } catch { /* ignore malformed cache */ }
      }
    }
  })();
</script>
</body>
</html>
